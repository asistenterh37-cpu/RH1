<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Caverna 3D Interactiva</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #030303;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    canvas {
      display: block;
    }

    /* Interfaz mínima: no rompe la inmersión */
    #startPanel {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at center, rgba(35, 22, 12, 0.55), rgba(0, 0, 0, 0.92));
      color: #f5dec1;
      z-index: 10;
      transition: opacity 0.6s ease;
    }

    #startPanel.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #startBox {
      width: min(520px, calc(100% - 40px));
      padding: 28px;
      border: 1px solid rgba(255, 183, 94, 0.28);
      border-radius: 22px;
      background: rgba(12, 8, 5, 0.74);
      box-shadow: 0 0 70px rgba(255, 120, 30, 0.14);
      backdrop-filter: blur(10px);
      text-align: center;
    }

    #startBox h1 {
      margin: 0 0 10px;
      font-size: clamp(1.7rem, 4vw, 2.8rem);
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    #startBox p {
      margin: 8px 0;
      color: rgba(245, 222, 193, 0.8);
      line-height: 1.5;
    }

    #startButton {
      margin-top: 18px;
      padding: 13px 24px;
      border: 0;
      border-radius: 999px;
      color: #1c0e03;
      font-weight: 800;
      cursor: pointer;
      background: linear-gradient(135deg, #ffd28a, #ff7a22);
      box-shadow: 0 10px 30px rgba(255, 112, 25, 0.3);
    }

    #hud {
      position: fixed;
      left: 18px;
      bottom: 16px;
      z-index: 5;
      color: rgba(255, 228, 189, 0.65);
      font-size: 13px;
      letter-spacing: 0.02em;
      text-shadow: 0 2px 10px #000;
      user-select: none;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="startPanel">
    <div id="startBox">
      <h1>Caverna antigua</h1>
      <p>Explora en primera persona una cueva oscura con pasadizos, antorchas y arte rupestre.</p>
      <p><strong>Shift + ↑</strong> avanzar · <strong>↓</strong> retroceder · <strong>← / →</strong> girar</p>
      <button id="startButton">Entrar a la caverna</button>
    </div>
  </div>

  <div id="hud">Shift + ↑ avanzar · ↓ retroceder · ← / → girar</div>

  <!-- Three.js desde CDN: ideal para GitHub Pages sin instalación -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

  <script>
    /* =========================================================
       CAVERNA 3D INTERACTIVA
       - Un solo archivo index.html
       - Three.js + WebGL + Audio API
       - Movimiento en primera persona con colisiones básicas
       ========================================================= */

    let scene, camera, renderer, clock;
    let audioContext, masterGain, ambienceGain, stepGain;
    let ambienceNodes = [];
    let stepTimer = 0;
    let audioStarted = false;

    const keys = {
      forward: false,
      backward: false,
      left: false,
      right: false,
      shift: false
    };

    const player = {
      // El jugador inicia justo frente a la entrada y mirando hacia el interior.
      position: new THREE.Vector3(0, 1.7, -10.8),
      rotationY: 0,
      radius: 0.62,
      speed: 4.2,
      turnSpeed: 1.9
    };

    const torches = [];
    const colliders = [];
    const caveSegments = [];
    const rockObjects = [];
    let playerLight;
    let warmFillLight;

    init();
    animate();

    function init() {
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x020202);
      scene.fog = new THREE.FogExp2(0x080604, 0.026);

      clock = new THREE.Clock();

      camera = new THREE.PerspectiveCamera(72, window.innerWidth / window.innerHeight, 0.1, 180);
      camera.position.copy(player.position);

      renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.7));
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = 1.35;
      document.body.appendChild(renderer.domElement);

      createLighting();
      createCave();
      createEntrance();
      createRockDetails();
      createRupestrianArt();
      createTorches();
      createMistParticles();

      window.addEventListener("resize", onResize);
      window.addEventListener("keydown", onKeyDown);
      window.addEventListener("keyup", onKeyUp);
      document.getElementById("startButton").addEventListener("click", startExperience);
    }

    function startExperience() {
      document.getElementById("startPanel").classList.add("hidden");
      startAudio();
    }

    function createLighting() {
      // Luz ambiental tenue, suficiente para ver roca sin perder misterio.
      const ambient = new THREE.AmbientLight(0x2b2117, 0.95);
      scene.add(ambient);

      // Luz cálida de entrada para que la cueva sea visible desde el primer segundo.
      const entranceGlow = new THREE.PointLight(0xffc27a, 3.8, 24, 1.45);
      entranceGlow.position.set(0, 3.2, -11.8);
      entranceGlow.castShadow = true;
      scene.add(entranceGlow);

      // Relleno cinematográfico suave para revelar paredes, suelo y techo.
      warmFillLight = new THREE.HemisphereLight(0xb89162, 0x120b05, 1.15);
      scene.add(warmFillLight);

      // Luz tipo antorcha en mano del explorador. Evita que la pantalla quede negra.
      playerLight = new THREE.PointLight(0xffb15c, 2.8, 9.5, 1.6);
      playerLight.castShadow = false;
      scene.add(playerLight);
    }

    function createCave() {
      const wallMat = createRockMaterial();
      const floorMat = createRockMaterial(0.7);
      const roofMat = createRockMaterial(0.55);

      // Mapa modular de pasadizos: cada segmento es un bloque/corredor.
      const segments = [
        { x: 0, z: -3, w: 7, d: 10 },
        { x: 0, z: 7, w: 7, d: 12 },
        { x: -7, z: 8, w: 9, d: 6 },
        { x: 8, z: 10, w: 9, d: 6 },
        { x: 0, z: 19, w: 7, d: 12 },
        { x: -8, z: 23, w: 9, d: 7 },
        { x: 8, z: 26, w: 9, d: 8 },
        { x: 0, z: 34, w: 8, d: 12 },
        { x: -9, z: 37, w: 8, d: 8 },
        { x: 10, z: 39, w: 10, d: 8 }
      ];

      caveSegments.push(...segments);

      segments.forEach((s, i) => {
        createSegmentFloorAndRoof(s, floorMat, roofMat, i);
        createSegmentWalls(s, wallMat, i);
      });

      // Rocas que bloquean parcialmente algunos caminos y crean laberinto.
      const obstacles = [
        { x: -2.7, z: 11.5, r: 1.2 }, { x: 2.8, z: 15.8, r: 1.1 },
        { x: -5.5, z: 22, r: 1.0 }, { x: 5.6, z: 25.2, r: 1.2 },
        { x: 0.8, z: 30.4, r: 1.1 }, { x: -2.2, z: 35.5, r: 1.2 },
        { x: 8.3, z: 37.2, r: 1.0 }
      ];

      obstacles.forEach((o, i) => {
        const rock = createBoulder(o.r, wallMat);
        rock.position.set(o.x, 0.25, o.z);
        rock.rotation.set(randomBetween(-0.2, 0.2), randomBetween(0, Math.PI), randomBetween(-0.16, 0.16));
        rock.castShadow = true;
        rock.receiveShadow = true;
        scene.add(rock);
        rockObjects.push(rock);
        colliders.push({ x: o.x, z: o.z, r: o.r + 0.55, type: "circle" });
      });
    }

    function createSegmentFloorAndRoof(s, floorMat, roofMat, index) {
      const floorGeo = new THREE.PlaneGeometry(s.w, s.d, 18, 28);
      displacePlane(floorGeo, 0.16);
      const floor = new THREE.Mesh(floorGeo, floorMat);
      floor.rotation.x = -Math.PI / 2;
      floor.position.set(s.x, 0, s.z);
      floor.receiveShadow = true;
      scene.add(floor);

      const roofGeo = new THREE.PlaneGeometry(s.w, s.d, 16, 24);
      displacePlane(roofGeo, 0.42);
      const roof = new THREE.Mesh(roofGeo, roofMat);
      roof.rotation.x = Math.PI / 2;
      roof.position.set(s.x, 4.15 + Math.sin(index) * 0.28, s.z);
      roof.receiveShadow = true;
      scene.add(roof);
    }

    function createSegmentWalls(s, mat, index) {
      // Paredes con interrupciones simuladas por superposición de segmentos.
      const wallH = 4.2;
      const thickness = 0.38;
      const walls = [
        { x: s.x - s.w / 2, z: s.z, w: thickness, d: s.d, side: "left" },
        { x: s.x + s.w / 2, z: s.z, w: thickness, d: s.d, side: "right" },
        { x: s.x, z: s.z - s.d / 2, w: s.w, d: thickness, side: "back" },
        { x: s.x, z: s.z + s.d / 2, w: s.w, d: thickness, side: "front" }
      ];

      walls.forEach((w, wi) => {
        if (shouldSkipWallOpening(s, w.side)) return;

        const geo = new THREE.BoxGeometry(w.w, wallH, w.d, 3, 10, 3);
        displaceBox(geo, 0.18);
        const mesh = new THREE.Mesh(geo, mat);
        mesh.position.set(w.x, wallH / 2, w.z);
        mesh.castShadow = true;
        mesh.receiveShadow = true;
        mesh.rotation.y = randomBetween(-0.03, 0.03);
        scene.add(mesh);

        colliders.push({
          minX: w.x - w.w / 2 - player.radius,
          maxX: w.x + w.w / 2 + player.radius,
          minZ: w.z - w.d / 2 - player.radius,
          maxZ: w.z + w.d / 2 + player.radius,
          type: "box"
        });
      });
    }

    function shouldSkipWallOpening(s, side) {
      // Evita cerrar por completo conexiones entre corredores superpuestos.
      // Mantiene límites suficientes para que el jugador no salga del sistema.
      const openings = [
        { x: 0, z: -3, side: "front" }, { x: 0, z: 7, side: "back" },
        { x: 0, z: 7, side: "front" }, { x: 0, z: 19, side: "back" },
        { x: 0, z: 19, side: "front" }, { x: 0, z: 34, side: "back" },
        { x: 0, z: 7, side: "left" }, { x: -7, z: 8, side: "right" },
        { x: 0, z: 7, side: "right" }, { x: 8, z: 10, side: "left" },
        { x: 0, z: 19, side: "left" }, { x: -8, z: 23, side: "right" },
        { x: 0, z: 19, side: "right" }, { x: 8, z: 26, side: "left" },
        { x: 0, z: 34, side: "left" }, { x: -9, z: 37, side: "right" },
        { x: 0, z: 34, side: "right" }, { x: 10, z: 39, side: "left" }
      ];
      return openings.some(o => Math.abs(o.x - s.x) < 0.1 && Math.abs(o.z - s.z) < 0.1 && o.side === side);
    }

    function createEntrance() {
      const mat = createRockMaterial(0.9);
      const archGroup = new THREE.Group();

      for (let i = 0; i < 16; i++) {
        const angle = Math.PI * (i / 15);
        const x = Math.cos(angle) * 4.15;
        const y = Math.sin(angle) * 3.0 + 0.55;
        const rock = createBoulder(randomBetween(0.45, 0.82), mat);
        rock.position.set(x, y, -8.55);
        rock.scale.y *= randomBetween(0.8, 1.35);
        rock.castShadow = true;
        archGroup.add(rock);
      }

      // Laterales de la entrada.
      [-4.3, 4.3].forEach(x => {
        for (let j = 0; j < 5; j++) {
          const rock = createBoulder(randomBetween(0.65, 1.05), mat);
          rock.position.set(x + randomBetween(-0.25, 0.25), 0.5 + j * 0.65, -8.5 + randomBetween(-0.15, 0.15));
          rock.castShadow = true;
          archGroup.add(rock);
        }
      });

      scene.add(archGroup);
    }

    function createRockDetails() {
      const mat = createRockMaterial(0.72);
      for (let i = 0; i < 85; i++) {
        const s = caveSegments[Math.floor(Math.random() * caveSegments.length)];
        const side = Math.random() > 0.5 ? -1 : 1;
        const x = s.x + side * (s.w / 2 - 0.25) + randomBetween(-0.15, 0.15);
        const z = s.z + randomBetween(-s.d / 2 + 0.6, s.d / 2 - 0.6);
        const rock = createBoulder(randomBetween(0.12, 0.38), mat);
        rock.position.set(x, randomBetween(0.4, 3.5), z);
        rock.scale.set(randomBetween(0.5, 1.2), randomBetween(0.5, 1.8), randomBetween(0.35, 0.8));
        rock.castShadow = true;
        rock.receiveShadow = true;
        scene.add(rock);
      }
    }

    function createRupestrianArt() {
      const artPositions = [
        { x: -3.43, y: 2.0, z: 3.5, ry: Math.PI / 2 },
        { x: 3.43, y: 2.05, z: 12.5, ry: -Math.PI / 2 },
        { x: -11.45, y: 2.1, z: 8.7, ry: Math.PI / 2 },
        { x: 3.43, y: 2.0, z: 22.8, ry: -Math.PI / 2 },
        { x: -4.05, y: 2.18, z: 34.0, ry: Math.PI / 2 },
        { x: 5.05, y: 2.1, z: 39.5, ry: -Math.PI / 2 }
      ];

      artPositions.forEach((p, i) => {
        const tex = createCaveArtTexture(i);
        const mat = new THREE.MeshBasicMaterial({
          map: tex,
          transparent: true,
          opacity: 0.78,
          depthWrite: false
        });
        const panel = new THREE.Mesh(new THREE.PlaneGeometry(2.6, 1.55), mat);
        panel.position.set(p.x, p.y, p.z);
        panel.rotation.y = p.ry;
        scene.add(panel);
      });
    }

    function createCaveArtTexture(seed) {
      const c = document.createElement("canvas");
      c.width = 512;
      c.height = 320;
      const ctx = c.getContext("2d");
      ctx.clearRect(0, 0, c.width, c.height);
      ctx.lineCap = "round";
      ctx.lineJoin = "round";

      const pigments = ["rgba(175,72,34,0.82)", "rgba(218,143,70,0.72)", "rgba(95,41,25,0.9)"];
      ctx.strokeStyle = pigments[seed % pigments.length];
      ctx.fillStyle = pigments[(seed + 1) % pigments.length];

      // Manos primitivas.
      for (let i = 0; i < 2; i++) drawHand(ctx, 80 + i * 250 + seed * 12 % 50, 105 + i * 42);

      // Animal simple tipo venado/bisonte.
      ctx.strokeStyle = pigments[(seed + 2) % pigments.length];
      ctx.lineWidth = 9;
      ctx.beginPath();
      ctx.ellipse(255, 180, 70, 30, -0.1, 0, Math.PI * 2);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(315, 168); ctx.lineTo(355, 145); ctx.lineTo(375, 152);
      ctx.moveTo(350, 145); ctx.lineTo(365, 122);
      ctx.moveTo(350, 145); ctx.lineTo(376, 130);
      ctx.moveTo(220, 205); ctx.lineTo(205, 252);
      ctx.moveTo(262, 207); ctx.lineTo(257, 255);
      ctx.moveTo(300, 204); ctx.lineTo(314, 250);
      ctx.stroke();

      // Figuras humanas y símbolos.
      ctx.lineWidth = 6;
      for (let i = 0; i < 5; i++) {
        const x = 60 + i * 85 + (seed * 9) % 35;
        const y = 250 + Math.sin(i + seed) * 12;
        drawStickHuman(ctx, x, y);
      }

      ctx.lineWidth = 5;
      for (let i = 0; i < 18; i++) {
        const x = Math.random() * 480 + 16;
        const y = Math.random() * 280 + 20;
        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.lineTo(x + randomBetween(-18, 18), y + randomBetween(-18, 18));
        ctx.stroke();
      }

      const texture = new THREE.CanvasTexture(c);
      texture.colorSpace = THREE.SRGBColorSpace;
      return texture;
    }

    function drawHand(ctx, x, y) {
      ctx.save();
      ctx.translate(x, y);
      ctx.globalAlpha = 0.72;
      ctx.beginPath();
      ctx.ellipse(0, 20, 22, 32, 0, 0, Math.PI * 2);
      ctx.fill();
      for (let f = -2; f <= 2; f++) {
        ctx.beginPath();
        ctx.ellipse(f * 12, -15 - Math.abs(f) * 3, 6, 28 - Math.abs(f) * 4, f * 0.08, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }

    function drawStickHuman(ctx, x, y) {
      ctx.beginPath();
      ctx.arc(x, y - 35, 9, 0, Math.PI * 2);
      ctx.moveTo(x, y - 26); ctx.lineTo(x, y + 12);
      ctx.moveTo(x, y - 10); ctx.lineTo(x - 22, y - 22);
      ctx.moveTo(x, y - 10); ctx.lineTo(x + 22, y - 20);
      ctx.moveTo(x, y + 12); ctx.lineTo(x - 18, y + 40);
      ctx.moveTo(x, y + 12); ctx.lineTo(x + 18, y + 40);
      ctx.stroke();
    }

    function createTorches() {
      const torchPlaces = [
        { x: -3.15, z: 0.5, ry: Math.PI / 2 }, { x: 3.15, z: 6.5, ry: -Math.PI / 2 },
        { x: -3.15, z: 15.5, ry: Math.PI / 2 }, { x: 3.15, z: 23.5, ry: -Math.PI / 2 },
        { x: -10.8, z: 8.2, ry: Math.PI / 2 }, { x: 12.0, z: 10.8, ry: -Math.PI / 2 },
        { x: -11.7, z: 24.0, ry: Math.PI / 2 }, { x: 12.2, z: 26.5, ry: -Math.PI / 2 },
        { x: -3.5, z: 35.0, ry: Math.PI / 2 }, { x: 5.5, z: 39.0, ry: -Math.PI / 2 }
      ];

      torchPlaces.forEach((p, i) => {
        const group = new THREE.Group();
        group.position.set(p.x, 1.65, p.z);
        group.rotation.y = p.ry;

        const handleMat = new THREE.MeshStandardMaterial({ color: 0x3a210f, roughness: 0.9 });
        const handle = new THREE.Mesh(new THREE.CylinderGeometry(0.055, 0.08, 0.95, 9), handleMat);
        handle.rotation.z = Math.PI / 8;
        handle.castShadow = true;
        group.add(handle);

        const flameMat = new THREE.MeshBasicMaterial({ color: 0xff8b28, transparent: true, opacity: 0.92 });
        const flame = new THREE.Mesh(new THREE.ConeGeometry(0.17, 0.55, 14), flameMat);
        flame.position.set(0.18, 0.47, 0);
        flame.rotation.z = -Math.PI / 9;
        group.add(flame);

        const light = new THREE.PointLight(0xff8a2a, 2.4, 10, 1.9);
        light.position.set(p.x + (p.ry > 0 ? 0.5 : -0.5), 2.0, p.z);
        light.castShadow = true;
        light.shadow.mapSize.width = 512;
        light.shadow.mapSize.height = 512;
        scene.add(light);

        scene.add(group);
        torches.push({ light, flame, baseIntensity: 2.2 + Math.random() * 0.55, phase: Math.random() * 100 });
      });
    }

    function createMistParticles() {
      const count = 260;
      const geo = new THREE.BufferGeometry();
      const positions = [];

      for (let i = 0; i < count; i++) {
        const s = caveSegments[Math.floor(Math.random() * caveSegments.length)];
        positions.push(
          s.x + randomBetween(-s.w / 2, s.w / 2),
          randomBetween(0.35, 3.5),
          s.z + randomBetween(-s.d / 2, s.d / 2)
        );
      }

      geo.setAttribute("position", new THREE.Float32BufferAttribute(positions, 3));
      const mat = new THREE.PointsMaterial({
        color: 0xbba58d,
        size: 0.045,
        transparent: true,
        opacity: 0.22,
        depthWrite: false
      });
      const points = new THREE.Points(geo, mat);
      scene.add(points);
    }

    function createRockMaterial(multiplier = 1) {
      const texture = createProceduralRockTexture(multiplier);
      texture.wrapS = THREE.RepeatWrapping;
      texture.wrapT = THREE.RepeatWrapping;
      texture.repeat.set(3, 3);

      return new THREE.MeshStandardMaterial({
        map: texture,
        color: new THREE.Color(0.72 * multiplier, 0.64 * multiplier, 0.52 * multiplier),
        roughness: 0.94,
        metalness: 0.02,
        bumpMap: texture,
        bumpScale: 0.11
      });
    }

    function createProceduralRockTexture(multiplier) {
      const c = document.createElement("canvas");
      c.width = 512;
      c.height = 512;
      const ctx = c.getContext("2d");
      const image = ctx.createImageData(c.width, c.height);

      for (let y = 0; y < c.height; y++) {
        for (let x = 0; x < c.width; x++) {
          const i = (y * c.width + x) * 4;
          const n = noise2D(x * 0.035, y * 0.035) * 0.6 + noise2D(x * 0.012, y * 0.012) * 0.4;
          const cracks = Math.abs(Math.sin((x + y * 0.7) * 0.045 + n * 7));
          const shade = Math.floor((95 + n * 105 + cracks * 38) * multiplier);
          image.data[i] = shade;
          image.data[i + 1] = Math.floor(shade * 0.89);
          image.data[i + 2] = Math.floor(shade * 0.76);
          image.data[i + 3] = 255;
        }
      }

      ctx.putImageData(image, 0, 0);
      const texture = new THREE.CanvasTexture(c);
      texture.colorSpace = THREE.SRGBColorSpace;
      return texture;
    }

    function createBoulder(radius, mat) {
      const geo = new THREE.IcosahedronGeometry(radius, 2);
      const pos = geo.attributes.position;
      for (let i = 0; i < pos.count; i++) {
        const v = new THREE.Vector3(pos.getX(i), pos.getY(i), pos.getZ(i));
        const factor = 1 + randomBetween(-0.18, 0.23);
        v.multiplyScalar(factor);
        pos.setXYZ(i, v.x, v.y, v.z);
      }
      geo.computeVertexNormals();
      return new THREE.Mesh(geo, mat);
    }

    function displacePlane(geo, amount) {
      const pos = geo.attributes.position;
      for (let i = 0; i < pos.count; i++) {
        const x = pos.getX(i);
        const y = pos.getY(i);
        pos.setZ(i, noise2D(x * 1.6, y * 1.6) * amount + randomBetween(-amount, amount) * 0.35);
      }
      geo.computeVertexNormals();
    }

    function displaceBox(geo, amount) {
      const pos = geo.attributes.position;
      for (let i = 0; i < pos.count; i++) {
        const x = pos.getX(i), y = pos.getY(i), z = pos.getZ(i);
        const n = noise2D((x + z) * 2.2, y * 1.7) * amount;
        pos.setXYZ(i, x + randomBetween(-n, n), y + randomBetween(-n, n), z + randomBetween(-n, n));
      }
      geo.computeVertexNormals();
    }

    function onKeyDown(e) {
      if (e.code === "ShiftLeft" || e.code === "ShiftRight") keys.shift = true;
      if (e.code === "ArrowUp") keys.forward = true;
      if (e.code === "ArrowDown") keys.backward = true;
      if (e.code === "ArrowLeft") keys.left = true;
      if (e.code === "ArrowRight") keys.right = true;
    }

    function onKeyUp(e) {
      if (e.code === "ShiftLeft" || e.code === "ShiftRight") keys.shift = false;
      if (e.code === "ArrowUp") keys.forward = false;
      if (e.code === "ArrowDown") keys.backward = false;
      if (e.code === "ArrowLeft") keys.left = false;
      if (e.code === "ArrowRight") keys.right = false;
    }

    function animate() {
      requestAnimationFrame(animate);
      const dt = Math.min(clock.getDelta(), 0.033);
      updatePlayer(dt);
      updateTorches(clock.elapsedTime);
      updateAudio(dt);
      renderer.render(scene, camera);
    }

    function updatePlayer(dt) {
      if (keys.left) player.rotationY += player.turnSpeed * dt;
      if (keys.right) player.rotationY -= player.turnSpeed * dt;

      const dir = new THREE.Vector3(Math.sin(player.rotationY), 0, Math.cos(player.rotationY));
      let moving = false;
      const next = player.position.clone();

      if (keys.forward && keys.shift) {
        next.addScaledVector(dir, player.speed * dt);
        moving = true;
      }

      if (keys.backward) {
        next.addScaledVector(dir, -player.speed * 0.72 * dt);
        moving = true;
      }

      if (!collides(next)) {
        player.position.copy(next);
      }

      // Cabeceo suave al caminar.
      const bob = moving ? Math.sin(clock.elapsedTime * 10.5) * 0.045 : 0;
      camera.position.set(player.position.x, player.position.y + bob, player.position.z);
      camera.rotation.set(0, player.rotationY, 0, "YXZ");

      // La luz frontal acompaña al jugador y apunta visualmente hacia el recorrido.
      if (playerLight) {
        playerLight.position.set(
          player.position.x + Math.sin(player.rotationY) * 0.65,
          player.position.y + 0.1,
          player.position.z + Math.cos(player.rotationY) * 0.65
        );
      }
      camera.userData.isMoving = moving && !collides(next);
    }

    function collides(pos) {
      // Limita al jugador a estar dentro de algún segmento de cueva.
      const insideAnySegment = caveSegments.some(s =>
        pos.x > s.x - s.w / 2 + player.radius &&
        pos.x < s.x + s.w / 2 - player.radius &&
        pos.z > s.z - s.d / 2 + player.radius &&
        pos.z < s.z + s.d / 2 - player.radius
      );
      if (!insideAnySegment) return true;

      for (const c of colliders) {
        if (c.type === "circle") {
          const dx = pos.x - c.x;
          const dz = pos.z - c.z;
          if (Math.sqrt(dx * dx + dz * dz) < c.r) return true;
        } else if (c.type === "box") {
          if (pos.x > c.minX && pos.x < c.maxX && pos.z > c.minZ && pos.z < c.maxZ) return true;
        }
      }
      return false;
    }

    function updateTorches(t) {
      torches.forEach(torch => {
        const flicker = 0.75 + Math.sin(t * 9 + torch.phase) * 0.16 + Math.random() * 0.18;
        torch.light.intensity = torch.baseIntensity * flicker;
        torch.light.distance = 8.2 + Math.random() * 1.2;
        torch.flame.scale.set(
          0.85 + Math.random() * 0.26,
          0.9 + Math.random() * 0.45,
          0.85 + Math.random() * 0.26
        );
        torch.flame.material.opacity = 0.72 + Math.random() * 0.25;
      });
    }

    /* ========================= AUDIO API ========================= */

    function startAudio() {
      if (audioStarted) return;
      audioStarted = true;

      audioContext = new (window.AudioContext || window.webkitAudioContext)();
      masterGain = audioContext.createGain();
      masterGain.gain.value = 0.52;
      masterGain.connect(audioContext.destination);

      ambienceGain = audioContext.createGain();
      ambienceGain.gain.value = 0.18;
      ambienceGain.connect(masterGain);

      stepGain = audioContext.createGain();
      stepGain.gain.value = 0.0;
      stepGain.connect(masterGain);

      createCaveAmbience();
    }

    function createCaveAmbience() {
      // Viento grave y humedad lejana generados proceduralmente.
      const lowOsc = audioContext.createOscillator();
      const lowFilter = audioContext.createBiquadFilter();
      const lowGain = audioContext.createGain();
      lowOsc.type = "sine";
      lowOsc.frequency.value = 52;
      lowFilter.type = "lowpass";
      lowFilter.frequency.value = 180;
      lowGain.gain.value = 0.12;
      lowOsc.connect(lowFilter).connect(lowGain).connect(ambienceGain);
      lowOsc.start();
      ambienceNodes.push(lowOsc);

      // Goteo distante irregular.
      setInterval(() => {
        if (!audioStarted || !audioContext) return;
        if (Math.random() < 0.42) createDripSound();
      }, 950);
    }

    function createDripSound() {
      const osc = audioContext.createOscillator();
      const gain = audioContext.createGain();
      const filter = audioContext.createBiquadFilter();
      osc.type = "triangle";
      osc.frequency.setValueAtTime(randomBetween(650, 1150), audioContext.currentTime);
      filter.type = "bandpass";
      filter.frequency.value = 900;
      gain.gain.setValueAtTime(0.0, audioContext.currentTime);
      gain.gain.linearRampToValueAtTime(0.035, audioContext.currentTime + 0.012);
      gain.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.42);
      osc.connect(filter).connect(gain).connect(ambienceGain);
      osc.start();
      osc.stop(audioContext.currentTime + 0.45);
    }

    function updateAudio(dt) {
      if (!audioStarted || !audioContext) return;
      const moving = camera.userData.isMoving;

      stepTimer -= dt;
      if (moving && stepTimer <= 0) {
        createFootstep();
        stepTimer = 0.36;
      }
    }

    function createFootstep() {
      const duration = 0.13;
      const bufferSize = Math.floor(audioContext.sampleRate * duration);
      const buffer = audioContext.createBuffer(1, bufferSize, audioContext.sampleRate);
      const data = buffer.getChannelData(0);

      for (let i = 0; i < bufferSize; i++) {
        const env = 1 - i / bufferSize;
        data[i] = (Math.random() * 2 - 1) * env * env;
      }

      const source = audioContext.createBufferSource();
      source.buffer = buffer;

      const filter = audioContext.createBiquadFilter();
      filter.type = "bandpass";
      filter.frequency.value = randomBetween(180, 420);
      filter.Q.value = 0.9;

      const gain = audioContext.createGain();
      gain.gain.setValueAtTime(0.0, audioContext.currentTime);
      gain.gain.linearRampToValueAtTime(0.12, audioContext.currentTime + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + duration);

      source.connect(filter).connect(gain).connect(masterGain);
      source.start();
      source.stop(audioContext.currentTime + duration);
    }

    function onResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    /* ========================= UTILIDADES ========================= */

    function randomBetween(min, max) {
      return min + Math.random() * (max - min);
    }

    // Ruido simple determinista para texturas y deformaciones.
    function noise2D(x, y) {
      const n = Math.sin(x * 12.9898 + y * 78.233) * 43758.5453;
      return (n - Math.floor(n));
    }
  </script>

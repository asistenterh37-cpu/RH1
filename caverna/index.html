<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Caverna Interactiva 3D</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:#000;
  font-family:Arial,sans-serif;
}

.scene{
  position:relative;
  width:100vw;
  height:100vh;
  overflow:hidden;
  perspective:900px;
  background:#020202;
  cursor:grab;
}

.scene:active{
  cursor:grabbing;
}

.world{
  position:absolute;
  inset:0;
  transform-style:preserve-3d;
  transition:transform .12s linear;
}

/* FONDO PROFUNDO */
.depth{
  position:absolute;
  inset:-10%;
  background:
    radial-gradient(circle at 50% 42%, rgba(70,100,120,.35) 0%, transparent 13%),
    radial-gradient(circle at 50% 45%, rgba(0,0,0,.2) 0%, rgba(0,0,0,.8) 45%, #000 85%);
  transform:translateZ(-900px) scale(2.4);
}

/* TÚNELES */
.tunnel{
  position:absolute;
  top:50%;
  width:42vw;
  height:72vh;
  border-radius:45% 45% 38% 38%;
  background:
    radial-gradient(circle at center, rgba(4,10,14,.2) 0%, rgba(0,0,0,.9) 54%, #000 75%),
    repeating-radial-gradient(circle at center,
      rgba(110,75,45,.28) 0 6px,
      rgba(35,24,18,.55) 7px 22px,
      rgba(0,0,0,.8) 23px 42px
    );
  box-shadow:
    inset 0 0 90px #000,
    inset 0 0 180px rgba(0,0,0,.95),
    0 0 45px rgba(0,0,0,.8);
  transform-style:preserve-3d;
}

.tunnel.left{
  left:8%;
  transform:translateY(-45%) rotateY(18deg) translateZ(-260px);
}

.tunnel.center{
  left:50%;
  width:36vw;
  height:80vh;
  transform:translate(-50%,-48%) translateZ(-420px);
}

.tunnel.right{
  right:8%;
  transform:translateY(-45%) rotateY(-18deg) translateZ(-260px);
}

/* PAREDES */
.wall{
  position:absolute;
  top:-8%;
  bottom:-8%;
  width:38vw;
  background:
    radial-gradient(circle at 40% 20%, rgba(180,120,60,.22), transparent 18%),
    radial-gradient(circle at 60% 70%, rgba(120,80,45,.24), transparent 20%),
    repeating-linear-gradient(105deg,
      rgba(120,80,45,.38) 0 6px,
      rgba(40,28,20,.8) 7px 18px,
      rgba(0,0,0,.85) 19px 36px
    );
  filter:contrast(1.25);
  box-shadow:inset 0 0 110px #000;
  z-index:3;
}

.wall.left{
  left:-7%;
  clip-path:polygon(0 0,100% 8%,82% 100%,0 100%);
}

.wall.right{
  right:-7%;
  clip-path:polygon(0 8%,100% 0,100% 100%,18% 100%);
}

/* TECHO */
.ceiling{
  position:absolute;
  top:-18%;
  left:-10%;
  width:120%;
  height:42vh;
  background:
    radial-gradient(circle at 20% 70%, rgba(160,100,45,.24), transparent 16%),
    radial-gradient(circle at 70% 50%, rgba(120,75,45,.24), transparent 20%),
    repeating-linear-gradient(20deg,
      rgba(100,70,45,.34) 0 5px,
      rgba(32,22,16,.82) 6px 20px,
      rgba(0,0,0,.86) 21px 42px
    );
  clip-path:polygon(0 0,100% 0,94% 70%,74% 88%,50% 72%,28% 92%,5% 75%);
  box-shadow:inset 0 0 120px #000;
  z-index:4;
}

/* PISO */
.floor{
  position:absolute;
  left:50%;
  bottom:-26%;
  width:150vw;
  height:65vh;
  transform:translateX(-50%) rotateX(72deg);
  transform-origin:center bottom;
  background:
    radial-gradient(circle at 50% 20%, rgba(255,155,70,.18), transparent 22%),
    repeating-linear-gradient(
      92deg,
      rgba(255,255,255,.055) 0 2px,
      transparent 3px 34px
    ),
    repeating-linear-gradient(
      0deg,
      rgba(115,75,42,.38) 0 5px,
      rgba(35,24,18,.9) 6px 24px,
      rgba(0,0,0,.8) 25px 45px
    );
  box-shadow:inset 0 0 110px #000;
  z-index:5;
  animation:floorMove 8s linear infinite;
}

@keyframes floorMove{
  from{background-position:0 0,0 0,0 0}
  to{background-position:0 0,0 180px,0 220px}
}

/* ESTALACTITAS */
.stalactite{
  position:absolute;
  top:0;
  width:45px;
  height:160px;
  background:linear-gradient(to bottom,#2a1a10,#090604);
  clip-path:polygon(35% 0,75% 0,50% 100%);
  z-index:8;
  filter:drop-shadow(0 0 12px #000);
}

.s1{left:14%;height:190px}
.s2{left:28%;height:120px}
.s3{left:47%;height:170px}
.s4{right:25%;height:130px}
.s5{right:10%;height:200px}

/* ANTORCHAS */
.torch{
  position:absolute;
  width:18px;
  height:120px;
  background:linear-gradient(to bottom,#5c2f12,#1b0d05);
  z-index:15;
  transform-origin:center bottom;
  box-shadow:0 0 10px #000;
}

.torch.left1{left:12%;top:43%;transform:rotate(-10deg)}
.torch.left2{left:30%;top:50%;transform:scale(.7) rotate(-8deg)}
.torch.right1{right:10%;top:40%;transform:rotate(10deg)}
.torch.right2{right:29%;top:52%;transform:scale(.7) rotate(8deg)}

.flame{
  position:absolute;
  top:-55px;
  left:-22px;
  width:62px;
  height:70px;
  border-radius:50% 50% 45% 45%;
  background:
    radial-gradient(circle at 50% 65%, #fff7b0 0 12%, #ffb347 24%, #ff6b00 48%, rgba(180,20,0,.3) 70%, transparent 72%);
  filter:blur(.2px);
  box-shadow:
    0 0 25px #ff9b22,
    0 0 60px rgba(255,120,0,.9),
    0 0 110px rgba(255,90,0,.55);
  animation:flicker .12s infinite alternate;
}

@keyframes flicker{
  from{transform:scale(.9) rotate(-3deg); opacity:.82}
  to{transform:scale(1.12) rotate(3deg); opacity:1}
}

/* LUZ DE ANTORCHAS */
.glow{
  position:absolute;
  width:380px;
  height:380px;
  border-radius:50%;
  background:radial-gradient(circle, rgba(255,125,35,.36), transparent 68%);
  filter:blur(18px);
  z-index:9;
  pointer-events:none;
  animation:glowPulse 1.2s ease-in-out infinite alternate;
}

.glow.g1{left:0%;top:26%}
.glow.g2{right:-3%;top:24%}
.glow.g3{left:20%;top:38%;transform:scale(.6)}
.glow.g4{right:20%;top:39%;transform:scale(.6)}

@keyframes glowPulse{
  from{opacity:.45}
  to{opacity:.85}
}

/* DIBUJOS RUPESTRES */
.petroglyph{
  position:absolute;
  z-index:16;
  color:rgba(170,90,45,.78);
  font-weight:bold;
  font-size:42px;
  text-shadow:0 0 8px rgba(255,130,45,.25);
  opacity:.75;
  pointer-events:none;
}

.p1{left:8%;top:58%;transform:rotate(-8deg)}
.p2{left:16%;top:43%;font-size:34px;transform:rotate(5deg)}
.p3{left:45%;top:44%;font-size:48px;transform:rotate(-2deg)}
.p4{right:12%;top:55%;font-size:44px;transform:rotate(9deg)}
.p5{right:20%;top:38%;font-size:32px;transform:rotate(-6deg)}

.petroglyph svg{
  width:120px;
  height:120px;
  stroke:rgba(180,95,45,.82);
  fill:none;
  stroke-width:4;
  filter:drop-shadow(0 0 5px rgba(255,130,45,.2));
}

/* NIEBLA */
.fog{
  position:absolute;
  inset:-25%;
  background:
    radial-gradient(circle at 20% 55%, rgba(255,255,255,.065), transparent 22%),
    radial-gradient(circle at 65% 48%, rgba(255,255,255,.045), transparent 28%),
    radial-gradient(circle at 50% 80%, rgba(255,255,255,.04), transparent 28%);
  filter:blur(45px);
  opacity:.7;
  z-index:18;
  animation:fogMove 18s linear infinite alternate;
}

@keyframes fogMove{
  from{transform:translateX(-4%) translateY(-2%)}
  to{transform:translateX(4%) translateY(3%)}
}

/* VIÑETA */
.vignette{
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at center, transparent 18%, rgba(0,0,0,.42) 58%, #000 95%);
  z-index:30;
  pointer-events:none;
}

/* CAPA DE ENTRADA */
.start{
  position:absolute;
  inset:0;
  z-index:50;
  background:radial-gradient(circle at center, rgba(0,0,0,.25), rgba(0,0,0,.95));
  display:flex;
  align-items:center;
  justify-content:center;
  transition:opacity 1s ease, transform 1s ease;
}

.start.hidden{
  opacity:0;
  transform:scale(1.25);
  pointer-events:none;
}

.enter{
  width:120px;
  height:120px;
  border-radius:50%;
  border:1px solid rgba(255,170,80,.55);
  background:radial-gradient(circle, rgba(255,150,55,.25), rgba(0,0,0,.4));
  box-shadow:
    0 0 25px rgba(255,130,45,.7),
    inset 0 0 28px rgba(255,180,80,.35);
  cursor:pointer;
  animation:portalPulse 1.4s ease-in-out infinite alternate;
}

@keyframes portalPulse{
  from{transform:scale(.94);opacity:.65}
  to{transform:scale(1.08);opacity:1}
}

/* EFECTO DE AVANZAR */
.scene.entering .world{
  animation:walk 4.8s ease-in-out forwards;
}

@keyframes walk{
  0%{transform:translateZ(0) rotateX(0) rotateY(0)}
  35%{transform:translateZ(220px) rotateX(1deg)}
  70%{transform:translateZ(460px) rotateX(-1deg)}
  100%{transform:translateZ(640px)}
}

/* PARTÍCULAS */
.particle{
  position:absolute;
  width:4px;
  height:4px;
  border-radius:50%;
  background:rgba(255,190,120,.55);
  z-index:21;
  animation:floatParticle linear infinite;
}

@keyframes floatParticle{
  from{transform:translateY(100vh);opacity:0}
  20%{opacity:.8}
  to{transform:translateY(-20vh);opacity:0}
}

@media(max-width:700px){
  .tunnel.left,.tunnel.right{
    width:52vw;
    height:58vh;
  }

  .tunnel.center{
    width:48vw;
  }

  .petroglyph svg{
    width:80px;
    height:80px;
  }

  .wall{
    width:46vw;
  }
}
</style>
</head>

<body>

<div class="scene" id="scene">

  <div class="world" id="world">
    <div class="depth"></div>

    <div class="tunnel left"></div>
    <div class="tunnel center"></div>
    <div class="tunnel right"></div>

    <div class="ceiling"></div>
    <div class="wall left"></div>
    <div class="wall right"></div>
    <div class="floor"></div>

    <div class="stalactite s1"></div>
    <div class="stalactite s2"></div>
    <div class="stalactite s3"></div>
    <div class="stalactite s4"></div>
    <div class="stalactite s5"></div>

    <div class="glow g1"></div>
    <div class="glow g2"></div>
    <div class="glow g3"></div>
    <div class="glow g4"></div>

    <div class="torch left1"><div class="flame"></div></div>
    <div class="torch left2"><div class="flame"></div></div>
    <div class="torch right1"><div class="flame"></div></div>
    <div class="torch right2"><div class="flame"></div></div>

    <div class="petroglyph p1">
      <svg viewBox="0 0 120 120">
        <circle cx="60" cy="22" r="12"/>
        <line x1="60" y1="34" x2="60" y2="78"/>
        <line x1="60" y1="45" x2="34" y2="62"/>
        <line x1="60" y1="45" x2="88" y2="62"/>
        <line x1="60" y1="78" x2="38" y2="108"/>
        <line x1="60" y1="78" x2="84" y2="108"/>
      </svg>
    </div>

    <div class="petroglyph p2">
      <svg viewBox="0 0 120 120">
        <circle cx="34" cy="62" r="18"/>
        <circle cx="72" cy="62" r="18"/>
        <circle cx="53" cy="34" r="18"/>
        <circle cx="53" cy="90" r="18"/>
      </svg>
    </div>

    <div class="petroglyph p3">
      <svg viewBox="0 0 120 120">
        <circle cx="60" cy="60" r="18"/>
        <line x1="60" y1="16" x2="60" y2="34"/>
        <line x1="60" y1="86" x2="60" y2="106"/>
        <line x1="16" y1="60" x2="34" y2="60"/>
        <line x1="86" y1="60" x2="106" y2="60"/>
        <line x1="28" y1="28" x2="42" y2="42"/>
        <line x1="92" y1="28" x2="78" y2="42"/>
        <line x1="28" y1="92" x2="42" y2="78"/>
        <line x1="92" y1="92" x2="78" y2="78"/>
      </svg>
    </div>

    <div class="petroglyph p4">
      <svg viewBox="0 0 120 120">
        <path d="M20 76 C30 42, 62 42, 76 64 C88 82, 105 72, 103 50"/>
        <circle cx="32" cy="75" r="5"/>
        <circle cx="78" cy="66" r="5"/>
        <line x1="46" y1="72" x2="40" y2="98"/>
        <line x1="64" y1="70" x2="70" y2="98"/>
      </svg>
    </div>

    <div class="petroglyph p5">
      <svg viewBox="0 0 120 120">
        <path d="M60 20 C15 30, 20 78, 56 70 C90 62, 96 96, 60 104"/>
      </svg>
    </div>

  </div>

  <div class="fog"></div>
  <div class="vignette"></div>

  <div class="start" id="start">
    <button class="enter" onclick="enterCave()" aria-label="Entrar"></button>
  </div>

</div>

<script>
const scene = document.getElementById("scene");
const world = document.getElementById("world");
const start = document.getElementById("start");

let mouseX = 0;
let mouseY = 0;
let targetX = 0;
let targetY = 0;
let entered = false;

function enterCave(){
  entered = true;
  start.classList.add("hidden");
  scene.classList.add("entering");

  setTimeout(()=>{
    scene.classList.remove("entering");
  }, 5000);
}

scene.addEventListener("mousemove", e=>{
  const x = (e.clientX / window.innerWidth - .5) * 2;
  const y = (e.clientY / window.innerHeight - .5) * 2;

  targetX = x * 10;
  targetY = y * -7;
});

scene.addEventListener("touchmove", e=>{
  const touch = e.touches[0];
  const x = (touch.clientX / window.innerWidth - .5) * 2;
  const y = (touch.clientY / window.innerHeight - .5) * 2;

  targetX = x * 10;
  targetY = y * -7;
});

function animateCamera(){
  mouseX += (targetX - mouseX) * .05;
  mouseY += (targetY - mouseY) * .05;

  if(!scene.classList.contains("entering")){
    world.style.transform = `
      rotateY(${mouseX}deg)
      rotateX(${mouseY}deg)
      translateZ(${entered ? 260 : 0}px)
    `;
  }

  requestAnimationFrame(animateCamera);
}

animateCamera();

function createParticles(){
  for(let i = 0; i < 42; i++){
    const p = document.createElement("div");
    p.className = "particle";
    p.style.left = Math.random() * 100 + "vw";
    p.style.animationDuration = 6 + Math.random() * 12 + "s";
    p.style.animationDelay = Math.random() * 8 + "s";
    p.style.opacity = Math.random();
    scene.appendChild(p);
  }
}

createParticles();

document.addEventListener("keydown", e=>{
  if(e.key === "Enter"){
    enterCave();
  }

  if(e.key === "ArrowLeft"){
    targetX -= 8;
  }

  if(e.key === "ArrowRight"){
    targetX += 8;
  }

  if(e.key === "ArrowUp"){
    world.style.transform += " translateZ(80px)";
  }

  if(e.key === "ArrowDown"){
    world.style.transform += " translateZ(-80px)";
  }
});
</script>

</body>
</html>

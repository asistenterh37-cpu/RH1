<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Caverna 3D</title>

<style>
html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #050201;
}

canvas {
  display: block;
}

#start {
  position: fixed;
  inset: 0;
  display: grid;
  place-items: center;
  background: radial-gradient(circle, rgba(255,150,60,.12), rgba(0,0,0,.95));
  z-index: 10;
}

#start button {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  border: 1px solid rgba(255,190,100,.65);
  background: radial-gradient(circle, rgba(255,160,70,.35), rgba(0,0,0,.55));
  box-shadow: 0 0 35px rgba(255,120,40,.8), inset 0 0 30px rgba(255,200,120,.25);
  cursor: pointer;
  animation: pulse 1.4s infinite alternate;
}

@keyframes pulse {
  from { transform: scale(.94); opacity: .7; }
  to { transform: scale(1.08); opacity: 1; }
}
</style>
</head>

<body>

<div id="start">
  <button id="enterBtn" aria-label="Entrar"></button>
</div>

<script type="module">
import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";

let scene, camera, renderer;
let moveForward = false;
let moveBackward = false;
let moveLeft = false;
let moveRight = false;
let entered = false;

let yaw = 0;
let pitch = 0;
let mouseDown = false;

init();
animate();

function init() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x050201);
  scene.fog = new THREE.FogExp2(0x130905, 0.035);

  camera = new THREE.PerspectiveCamera(
    75,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
  );

  camera.position.set(0, 2.2, 13);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  document.body.appendChild(renderer.domElement);

  createLights();
  createCave();
  createPassages();
  createTorches();
  createRupestrianDrawings();
  createDust();

  window.addEventListener("resize", onResize);
  document.addEventListener("keydown", onKeyDown);
  document.addEventListener("keyup", onKeyUp);

  document.addEventListener("mousedown", () => mouseDown = true);
  document.addEventListener("mouseup", () => mouseDown = false);
  document.addEventListener("mousemove", onMouseMove);

  document.getElementById("enterBtn").addEventListener("click", () => {
    entered = true;
    document.getElementById("start").style.display = "none";
  });
}

function createLights() {
  const ambient = new THREE.AmbientLight(0x3a1c0b, 1.4);
  scene.add(ambient);

  const backLight = new THREE.PointLight(0xffb45c, 4, 45);
  backLight.position.set(0, 6, -28);
  scene.add(backLight);

  const moonLight = new THREE.DirectionalLight(0xffd5a0, 1.2);
  moonLight.position.set(3, 8, 8);
  scene.add(moonLight);
}

function rockMaterial() {
  return new THREE.MeshStandardMaterial({
    color: 0x4b2b16,
    roughness: 1,
    metalness: 0,
    bumpScale: 0.22
  });
}

function createCave() {
  const floorGeo = new THREE.PlaneGeometry(60, 120, 80, 80);
  const floorMat = new THREE.MeshStandardMaterial({
    color: 0x3a2111,
    roughness: 1
  });

  const floor = new THREE.Mesh(floorGeo, floorMat);
  floor.rotation.x = -Math.PI / 2;
  floor.position.z = -25;
  scene.add(floor);

  const ceilingGeo = new THREE.PlaneGeometry(60, 120, 50, 50);
  const ceiling = new THREE.Mesh(ceilingGeo, rockMaterial());
  ceiling.rotation.x = Math.PI / 2;
  ceiling.position.set(0, 7, -25);
  scene.add(ceiling);

  const leftWallGeo = new THREE.PlaneGeometry(120, 18, 60, 20);
  const leftWall = new THREE.Mesh(leftWallGeo, rockMaterial());
  leftWall.rotation.y = Math.PI / 2.8;
  leftWall.position.set(-12, 3, -25);
  scene.add(leftWall);

  const rightWall = leftWall.clone();
  rightWall.rotation.y = -Math.PI / 2.8;
  rightWall.position.x = 12;
  scene.add(rightWall);

  for (let i = 0; i < 90; i++) {
    const stone = new THREE.Mesh(
      new THREE.DodecahedronGeometry(Math.random() * 0.9 + 0.25, 0),
      rockMaterial()
    );

    stone.position.set(
      (Math.random() - 0.5) * 26,
      Math.random() * 7,
      -Math.random() * 70
    );

    stone.scale.set(
      1 + Math.random() * 2,
      .6 + Math.random(),
      1 + Math.random() * 2
    );

    scene.add(stone);
  }
}

function createPassages() {
  createPassage(0, 2.8, -38, 0);
  createPassage(-9, 2.4, -30, 0.45);
  createPassage(9, 2.4, -30, -0.45);
}

function createPassage(x, y, z, rotY) {
  const group = new THREE.Group();
  group.position.set(x, y, z);
  group.rotation.y = rotY;

  const ringMat = new THREE.MeshStandardMaterial({
    color: 0x6b3d1b,
    roughness: 1
  });

  for (let i = 0; i < 18; i++) {
    const angle = (Math.PI * 2 * i) / 18;
    const radiusX = 3.2;
    const radiusY = 3.7;

    const block = new THREE.Mesh(
      new THREE.BoxGeometry(0.9, 1.1, 1.2),
      ringMat
    );

    block.position.set(
      Math.cos(angle) * radiusX,
      Math.sin(angle) * radiusY,
      0
    );

    block.rotation.z = angle;
    group.add(block);
  }

  const darkness = new THREE.Mesh(
    new THREE.CircleGeometry(3.1, 48),
    new THREE.MeshBasicMaterial({ color: 0x000000 })
  );
  darkness.position.z = -0.65;
  group.add(darkness);

  scene.add(group);
}

function createTorches() {
  createTorch(-6, 2.2, -8);
  createTorch(6, 2.2, -8);
  createTorch(-8.5, 2, -22);
  createTorch(8.5, 2, -22);
  createTorch(-5, 2.1, -34);
  createTorch(5, 2.1, -34);
}

function createTorch(x, y, z) {
  const torch = new THREE.Group();
  torch.position.set(x, y, z);

  const wood = new THREE.Mesh(
    new THREE.CylinderGeometry(0.08, 0.12, 1.7, 12),
    new THREE.MeshStandardMaterial({ color: 0x3a1605 })
  );
  wood.rotation.z = x < 0 ? -0.25 : 0.25;
  torch.add(wood);

  const flame = new THREE.Mesh(
    new THREE.ConeGeometry(0.38, 0.95, 24),
    new THREE.MeshBasicMaterial({
      color: 0xff7a00,
      transparent: true,
      opacity: 0.9
    })
  );
  flame.position.y = 1.05;
  torch.add(flame);

  const innerFlame = new THREE.Mesh(
    new THREE.ConeGeometry(0.22, 0.55, 24),
    new THREE.MeshBasicMaterial({
      color: 0xfff1a0,
      transparent: true,
      opacity: 0.9
    })
  );
  innerFlame.position.y = 1.1;
  torch.add(innerFlame);

  const light = new THREE.PointLight(0xff8b2b, 4.5, 12);
  light.position.y = 1.15;
  torch.add(light);

  torch.userData.flame = flame;
  torch.userData.innerFlame = innerFlame;
  torch.userData.light = light;

  scene.add(torch);
}

function createRupestrianDrawings() {
  createSymbol(-10.8, 3.3, -13, Math.PI / 2.8);
  createSymbol(10.8, 3.1, -18, -Math.PI / 2.8);
  createSymbol(-10.8, 3.7, -30, Math.PI / 2.8);
  createSymbol(10.8, 3.5, -34, -Math.PI / 2.8);
}

function createSymbol(x, y, z, rotY) {
  const group = new THREE.Group();
  group.position.set(x, y, z);
  group.rotation.y = rotY;

  const mat = new THREE.MeshBasicMaterial({ color: 0xc97832 });

  const head = new THREE.Mesh(new THREE.CircleGeometry(0.18, 24), mat);
  head.position.y = 0.65;
  group.add(head);

  const body = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.8, 0.04), mat);
  body.position.y = 0.1;
  group.add(body);

  const arm = new THREE.Mesh(new THREE.BoxGeometry(0.75, 0.07, 0.04), mat);
  arm.position.y = 0.25;
  arm.rotation.z = 0.3;
  group.add(arm);

  const leg1 = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.55, 0.04), mat);
  leg1.position.set(-0.18, -0.55, 0);
  leg1.rotation.z = -0.35;
  group.add(leg1);

  const leg2 = leg1.clone();
  leg2.position.x = 0.18;
  leg2.rotation.z = 0.35;
  group.add(leg2);

  scene.add(group);
}

function createDust() {
  const geometry = new THREE.BufferGeometry();
  const count = 700;
  const positions = [];

  for (let i = 0; i < count; i++) {
    positions.push(
      (Math.random() - 0.5) * 28,
      Math.random() * 8,
      -Math.random() * 70
    );
  }

  geometry.setAttribute(
    "position",
    new THREE.Float32BufferAttribute(positions, 3)
  );

  const material = new THREE.PointsMaterial({
    color: 0xffc47a,
    size: 0.045,
    transparent: true,
    opacity: 0.45
  });

  const dust = new THREE.Points(geometry, material);
  dust.name = "dust";
  scene.add(dust);
}

function onMouseMove(e) {
  if (!entered) return;

  const movementX = e.movementX || 0;
  const movementY = e.movementY || 0;

  if (mouseDown) {
    yaw -= movementX * 0.003;
    pitch -= movementY * 0.003;
    pitch = Math.max(-0.45, Math.min(0.45, pitch));
  }
}

function onKeyDown(e) {
  if (e.key.toLowerCase() === "w" || e.key === "ArrowUp") moveForward = true;
  if (e.key.toLowerCase() === "s" || e.key === "ArrowDown") moveBackward = true;
  if (e.key.toLowerCase() === "a" || e.key === "ArrowLeft") moveLeft = true;
  if (e.key.toLowerCase() === "d" || e.key === "ArrowRight") moveRight = true;
}

function onKeyUp(e) {
  if (e.key.toLowerCase() === "w" || e.key === "ArrowUp") moveForward = false;
  if (e.key.toLowerCase() === "s" || e.key === "ArrowDown") moveBackward = false;
  if (e.key.toLowerCase() === "a" || e.key === "ArrowLeft") moveLeft = false;
  if (e.key.toLowerCase() === "d" || e.key === "ArrowRight") moveRight = false;
}

function animate() {
  requestAnimationFrame(animate);

  if (entered) {
    camera.rotation.order = "YXZ";
    camera.rotation.y = yaw;
    camera.rotation.x = pitch;

    const speed = 0.11;
    const direction = new THREE.Vector3();

    if (moveForward) direction.z -= speed;
    if (moveBackward) direction.z += speed;
    if (moveLeft) direction.x -= speed;
    if (moveRight) direction.x += speed;

    direction.applyAxisAngle(new THREE.Vector3(0, 1, 0), yaw);
    camera.position.add(direction);

    camera.position.x = Math.max(-9.8, Math.min(9.8, camera.position.x));
    camera.position.z = Math.max(-42, Math.min(14, camera.position.z));
    camera.position.y = 2.2;
  }

  scene.traverse(obj => {
    if (obj.userData.flame) {
      const scale = 0.9 + Math.random() * 0.28;
      obj.userData.flame.scale.set(scale, scale, scale);
      obj.userData.innerFlame.scale.set(scale * .85, scale * .85, scale * .85);
      obj.userData.light.intensity = 3.5 + Math.random() * 2.2;
    }
  });

  const dust = scene.getObjectByName("dust");
  if (dust) {
    dust.rotation.y += 0.0007;
    dust.position.y = Math.sin(Date.now() * 0.0005) * 0.18;
  }

  renderer.render(scene, camera);
}

function onResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}
</script>

</body>
</html>

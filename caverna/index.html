<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Caverna RH 3D</title>

<style>
html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #050201;
  font-family: Arial, sans-serif;
}

canvas {
  display: block;
}

#start {
  position: fixed;
  inset: 0;
  display: grid;
  place-items: center;
  background:
    radial-gradient(circle, rgba(255,150,60,.15), rgba(0,0,0,.96));
  z-index: 20;
  transition: opacity 1s ease;
}

#start.hidden{
  opacity:0;
  pointer-events:none;
}

#enterBtn {
  width: 130px;
  height: 130px;
  border-radius: 50%;
  border: 1px solid rgba(255,190,100,.75);
  background:
    radial-gradient(circle,
      rgba(255,160,70,.4),
      rgba(0,0,0,.6)
    );

  box-shadow:
    0 0 42px rgba(255,120,40,.9),
    inset 0 0 35px rgba(255,200,120,.28);

  cursor: pointer;
  animation: pulse 1.3s infinite alternate;
}

@keyframes pulse {
  from {
    transform: scale(.94);
    opacity: .7;
  }

  to {
    transform: scale(1.08);
    opacity: 1;
  }
}

#hud{
  position:fixed;
  left:50%;
  bottom:20px;
  transform:translateX(-50%);
  color:rgba(255,220,170,.85);
  font-size:14px;
  letter-spacing:.5px;
  z-index:5;
  opacity:0;
  transition:opacity .8s;
  pointer-events:none;
}

#hud.show{
  opacity:1;
}
</style>
</head>

<body>

<div id="start">
  <button id="enterBtn"></button>
</div>

<div id="hud">
  WASD o Flechas · Click sostenido para mirar · Click en un portal
</div>

<script type="module">

import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";

let scene;
let camera;
let renderer;
let clock;

let entered = false;

let yaw = 0;
let pitch = 0;

let mouseDown = false;

let moveForward = false;
let moveBackward = false;
let moveLeft = false;
let moveRight = false;

let walkTime = 0;

const torches = [];
const portals = [];

init();
animate();

function init(){

  clock = new THREE.Clock();

  scene = new THREE.Scene();

  scene.background = new THREE.Color(0x050201);

  scene.fog = new THREE.FogExp2(
    0x120804,
    0.03
  );

  camera = new THREE.PerspectiveCamera(
    75,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
  );

  camera.position.set(0,2.2,14);

  renderer = new THREE.WebGLRenderer({
    antialias:true
  });

  renderer.setSize(
    window.innerWidth,
    window.innerHeight
  );

  renderer.shadowMap.enabled = true;

  renderer.setPixelRatio(
    Math.min(window.devicePixelRatio,2)
  );

  document.body.appendChild(renderer.domElement);

  createLights();

  createTextures();

  createCave();

  createPassages();

  createTorches();

  createParticles();

  createDecorations();

  createRupestrian();

  window.addEventListener("resize", onResize);

  document.addEventListener("keydown", onKeyDown);

  document.addEventListener("keyup", onKeyUp);

  document.addEventListener("mousedown", ()=>{
    mouseDown = true;
  });

  document.addEventListener("mouseup", ()=>{
    mouseDown = false;
  });

  document.addEventListener("mousemove", onMouseMove);

  document.addEventListener("click", onPortalClick);

  document
    .getElementById("enterBtn")
    .addEventListener("click", enterCave);
}

let rockTexture;
let sandTexture;

function createTextures(){

  rockTexture = createProceduralTexture(
    "#3a2111",
    "210,135,70"
  );

  sandTexture = createProceduralTexture(
    "#5a3518",
    "255,190,95"
  );
}

function createProceduralTexture(base,line){

  const canvas = document.createElement("canvas");

  canvas.width = 512;
  canvas.height = 512;

  const ctx = canvas.getContext("2d");

  ctx.fillStyle = base;

  ctx.fillRect(0,0,512,512);

  for(let i=0;i<1200;i++){

    ctx.fillStyle =
      `rgba(${line},${Math.random()*.3})`;

    ctx.beginPath();

    ctx.arc(
      Math.random()*512,
      Math.random()*512,
      Math.random()*4,
      0,
      Math.PI*2
    );

    ctx.fill();
  }

  for(let i=0;i<120;i++){

    ctx.strokeStyle =
      `rgba(0,0,0,${Math.random()*.2})`;

    ctx.lineWidth = Math.random()*3+1;

    ctx.beginPath();

    ctx.moveTo(
      Math.random()*512,
      Math.random()*512
    );

    ctx.lineTo(
      Math.random()*512,
      Math.random()*512
    );

    ctx.stroke();
  }

  const tex = new THREE.CanvasTexture(canvas);

  tex.wrapS = THREE.RepeatWrapping;
  tex.wrapT = THREE.RepeatWrapping;

  tex.repeat.set(5,5);

  return tex;
}

function rockMaterial(){

  return new THREE.MeshStandardMaterial({
    map:rockTexture,
    color:0x5b3418,
    roughness:1
  });
}

function sandMaterial(){

  return new THREE.MeshStandardMaterial({
    map:sandTexture,
    color:0x6b3b17,
    roughness:1
  });
}

function createLights(){

  const ambient =
    new THREE.AmbientLight(
      0x2c1609,
      1.4
    );

  scene.add(ambient);

  const warm =
    new THREE.PointLight(
      0xffb45c,
      4.5,
      60
    );

  warm.position.set(0,6,-35);

  scene.add(warm);

  const top =
    new THREE.DirectionalLight(
      0xffd5a0,
      1.1
    );

  top.position.set(5,8,10);

  scene.add(top);
}

function createCave(){

  const floor =
    new THREE.Mesh(
      new THREE.PlaneGeometry(70,140,80,80),
      sandMaterial()
    );

  floor.rotation.x = -Math.PI/2;

  floor.position.z = -32;

  floor.receiveShadow = true;

  scene.add(floor);

  const ceiling =
    new THREE.Mesh(
      new THREE.PlaneGeometry(70,140,50,20),
      rockMaterial()
    );

  ceiling.rotation.x = Math.PI/2;

  ceiling.position.set(0,7.5,-32);

  scene.add(ceiling);

  const leftWall =
    new THREE.Mesh(
      new THREE.PlaneGeometry(140,20,80,20),
      rockMaterial()
    );

  leftWall.rotation.y = Math.PI/2.7;

  leftWall.position.set(-12.5,3,-32);

  scene.add(leftWall);

  const rightWall = leftWall.clone();

  rightWall.rotation.y = -Math.PI/2.7;

  rightWall.position.x = 12.5;

  scene.add(rightWall);

  for(let i=0;i<130;i++){

    const rock =
      new THREE.Mesh(
        new THREE.DodecahedronGeometry(
          Math.random()*0.9+.25
        ),
        rockMaterial()
      );

    rock.position.set(
      (Math.random()-.5)*28,
      Math.random()*7,
      -Math.random()*85
    );

    rock.rotation.set(
      Math.random(),
      Math.random(),
      Math.random()
    );

    rock.castShadow = true;

    scene.add(rock);
  }
}

function createPassages(){

  createPassage(
    -8.5,
    2.8,
    -28,
    0.45,
    "https://tuusuario.github.io/evaluacion/"
  );

  createPassage(
    0,
    3,
    -40,
    0,
    "https://tuusuario.github.io/salarios/"
  );

  createPassage(
    8.5,
    2.8,
    -28,
    -0.45,
    "https://tuusuario.github.io/puestos/"
  );
}

function createPassage(x,y,z,rotY,url){

  const group = new THREE.Group();

  group.position.set(x,y,z);

  group.rotation.y = rotY;

  const mat =
    new THREE.MeshStandardMaterial({
      map:rockTexture,
      color:0x7b471f,
      roughness:1
    });

  for(let i=0;i<22;i++){

    const angle =
      (Math.PI*2*i)/22;

    const block =
      new THREE.Mesh(
        new THREE.BoxGeometry(.75,.95,1.1),
        mat
      );

    block.position.set(
      Math.cos(angle)*3.2,
      Math.sin(angle)*3.6,
      0
    );

    block.rotation.z = angle;

    group.add(block);
  }

  const darkness =
    new THREE.Mesh(
      new THREE.CircleGeometry(3.05,60),
      new THREE.MeshBasicMaterial({
        color:0x000000
      })
    );

  darkness.position.z = -.6;

  group.add(darkness);

  const glow =
    new THREE.PointLight(
      0xff9b3d,
      2.8,
      10
    );

  glow.position.z = 1;

  group.add(glow);

  const hitbox =
    new THREE.Mesh(
      new THREE.CircleGeometry(3.2,60),
      new THREE.MeshBasicMaterial({
        transparent:true,
        opacity:0
      })
    );

  hitbox.userData.url = url;

  group.add(hitbox);

  portals.push(hitbox);

  scene.add(group);
}

function createTorches(){

  createTorch(-6.8,2.1,-9);

  createTorch(6.8,2.1,-9);

  createTorch(-9,2.1,-22);

  createTorch(9,2.1,-22);

  createTorch(-4.8,2.2,-34);

  createTorch(4.8,2.2,-34);
}

function createTorch(x,y,z){

  const torch = new THREE.Group();

  torch.position.set(x,y,z);

  const wood =
    new THREE.Mesh(
      new THREE.CylinderGeometry(.08,.13,1.7,12),
      new THREE.MeshStandardMaterial({
        color:0x3a1605
      })
    );

  wood.rotation.z = x<0 ? -.25 : .25;

  torch.add(wood);

  const flame =
    new THREE.Mesh(
      new THREE.ConeGeometry(.38,.95,24),
      new THREE.MeshBasicMaterial({
        color:0xff7a00,
        transparent:true,
        opacity:.92
      })
    );

  flame.position.y = 1.05;

  torch.add(flame);

  const inner =
    new THREE.Mesh(
      new THREE.ConeGeometry(.22,.55,24),
      new THREE.MeshBasicMaterial({
        color:0xfff1a0,
        transparent:true,
        opacity:.95
      })
    );

  inner.position.y = 1.12;

  torch.add(inner);

  const light =
    new THREE.PointLight(
      0xff8b2b,
      4.8,
      13
    );

  light.position.y = 1.2;

  torch.add(light);

  torch.userData.flame = flame;
  torch.userData.inner = inner;
  torch.userData.light = light;

  torches.push(torch);

  scene.add(torch);
}

function createParticles(){

  const geo = new THREE.BufferGeometry();

  const count = 1200;

  const positions = [];

  for(let i=0;i<count;i++){

    positions.push(
      (Math.random()-.5)*30,
      Math.random()*8,
      -Math.random()*85
    );
  }

  geo.setAttribute(
    "position",
    new THREE.Float32BufferAttribute(
      positions,
      3
    )
  );

  const mat =
    new THREE.PointsMaterial({
      color:0xffc47a,
      size:.045,
      transparent:true,
      opacity:.42
    });

  const dust =
    new THREE.Points(
      geo,
      mat
    );

  dust.name = "dust";

  scene.add(dust);
}

function createDecorations(){

  for(let i=0;i<8;i++){

    const pot =
      new THREE.Mesh(
        new THREE.CylinderGeometry(.25,.35,.65,16),
        new THREE.MeshStandardMaterial({
          color:0x7b3f16,
          roughness:1
        })
      );

    pot.position.set(
      (Math.random()-.5)*18,
      .32,
      -Math.random()*55-8
    );

    scene.add(pot);
  }
}

function createRupestrian(){

  createSymbol(-11.2,3.3,-13,Math.PI/2.7);

  createSymbol(11.2,3.1,-18,-Math.PI/2.7);

  createSymbol(-11.2,3.7,-30,Math.PI/2.7);

  createSymbol(11.2,3.5,-34,-Math.PI/2.7);
}

function createSymbol(x,y,z,rotY){

  const group = new THREE.Group();

  group.position.set(x,y,z);

  group.rotation.y = rotY;

  const mat =
    new THREE.MeshBasicMaterial({
      color:0xc97832
    });

  const head =
    new THREE.Mesh(
      new THREE.CircleGeometry(.18,24),
      mat
    );

  head.position.y = .65;

  group.add(head);

  const body =
    new THREE.Mesh(
      new THREE.BoxGeometry(.08,.8,.04),
      mat
    );

  body.position.y = .1;

  group.add(body);

  const arm =
    new THREE.Mesh(
      new THREE.BoxGeometry(.75,.07,.04),
      mat
    );

  arm.position.y = .25;

  arm.rotation.z = .3;

  group.add(arm);

  scene.add(group);
}

function enterCave(){

  entered = true;

  document
    .getElementById("start")
    .classList.add("hidden");

  document
    .getElementById("hud")
    .classList.add("show");
}

function onMouseMove(e){

  if(!entered || !mouseDown) return;

  yaw -= (e.movementX||0)*.003;

  pitch -= (e.movementY||0)*.003;

  pitch = Math.max(
    -.5,
    Math.min(.5,pitch)
  );
}

function onPortalClick(e){

  if(!entered) return;

  const mouse =
    new THREE.Vector2(
      (e.clientX/window.innerWidth)*2-1,
      -(e.clientY/window.innerHeight)*2+1
    );

  const raycaster =
    new THREE.Raycaster();

  raycaster.setFromCamera(
    mouse,
    camera
  );

  const hits =
    raycaster.intersectObjects(
      portals,
      true
    );

  if(hits.length>0){

    const url =
      hits[0].object.userData.url;

    window.location.href = url;
  }
}

function onKeyDown(e){

  if(e.key.toLowerCase()==="w" || e.key==="ArrowUp")
    moveForward = true;

  if(e.key.toLowerCase()==="s" || e.key==="ArrowDown")
    moveBackward = true;

  if(e.key.toLowerCase()==="a" || e.key==="ArrowLeft")
    moveLeft = true;

  if(e.key.toLowerCase()==="d" || e.key==="ArrowRight")
    moveRight = true;
}

function onKeyUp(e){

  if(e.key.toLowerCase()==="w" || e.key==="ArrowUp")
    moveForward = false;

  if(e.key.toLowerCase()==="s" || e.key==="ArrowDown")
    moveBackward = false;

  if(e.key.toLowerCase()==="a" || e.key==="ArrowLeft")
    moveLeft = false;

  if(e.key.toLowerCase()==="d" || e.key==="ArrowRight")
    moveRight = false;
}

function animate(){

  requestAnimationFrame(animate);

  const delta = clock.getDelta();

  if(entered){

    camera.rotation.order = "YXZ";

    camera.rotation.y = yaw;

    camera.rotation.x = pitch;

    const speed = 5.5*delta;

    const direction =
      new THREE.Vector3();

    if(moveForward)
      direction.z -= speed;

    if(moveBackward)
      direction.z += speed;

    if(moveLeft)
      direction.x -= speed;

    if(moveRight)
      direction.x += speed;

    if(direction.length()>0){

      walkTime += delta*9;

      direction.applyAxisAngle(
        new THREE.Vector3(0,1,0),
        yaw
      );

      camera.position.add(direction);

      camera.position.y =
        2.2 + Math.sin(walkTime)*.06;
    }

    camera.position.x =
      Math.max(
        -10.2,
        Math.min(10.2,camera.position.x)
      );

    camera.position.z =
      Math.max(
        -44,
        Math.min(14,camera.position.z)
      );
  }

  torches.forEach(torch=>{

    const scale =
      .88 + Math.random()*.32;

    torch.userData.flame.scale.set(
      scale,
      scale,
      scale
    );

    torch.userData.inner.scale.set(
      scale*.85,
      scale*.85,
      scale*.85
    );

    torch.userData.light.intensity =
      3.6 + Math.random()*2.4;
  });

  const dust =
    scene.getObjectByName("dust");

  if(dust){

    dust.rotation.y += delta*.04;

    dust.position.y =
      Math.sin(Date.now()*.0005)*.18;
  }

  renderer.render(
    scene,
    camera
  );
}

function onResize(){

  camera.aspect =
    window.innerWidth /
    window.innerHeight;

  camera.updateProjectionMatrix();

  renderer.setSize(
    window.innerWidth,
    window.innerHeight
  );
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Caverna Persa 3D</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:#050201;
  font-family:Arial,sans-serif;
}

.scene{
  position:relative;
  width:100vw;
  height:100vh;
  overflow:hidden;
  perspective:1000px;
  background:
    radial-gradient(circle at center,rgba(150,85,30,.25),transparent 25%),
    linear-gradient(to bottom,#070301,#1a0d04 45%,#040201);
  cursor:grab;
}

.world{
  position:absolute;
  inset:0;
  transform-style:preserve-3d;
  transition:transform .12s linear;
}

.depth{
  position:absolute;
  inset:-20%;
  background:
    radial-gradient(circle at 50% 45%,rgba(255,185,80,.35),transparent 8%),
    radial-gradient(circle at 50% 46%,rgba(15,8,4,.35),rgba(0,0,0,.95) 70%);
  transform:translateZ(-1100px) scale(2.6);
}

.arch{
  position:absolute;
  left:50%;
  top:50%;
  width:42vw;
  height:82vh;
  transform:translate(-50%,-48%) translateZ(-300px);
  border-radius:50% 50% 10% 10%;
  background:
    radial-gradient(circle at center,rgba(0,0,0,.05) 0%,rgba(0,0,0,.72) 47%,#000 75%),
    repeating-radial-gradient(circle at center,
      rgba(170,105,45,.32) 0 5px,
      rgba(70,38,18,.65) 6px 22px,
      rgba(10,5,2,.9) 23px 45px
    );
  box-shadow:
    inset 0 0 90px #000,
    inset 0 0 220px rgba(0,0,0,.95),
    0 0 60px rgba(255,130,35,.16);
  z-index:3;
}

.passage{
  position:absolute;
  top:51%;
  width:34vw;
  height:66vh;
  border-radius:48% 48% 14% 14%;
  background:
    radial-gradient(circle at center,rgba(0,0,0,.2) 0%,rgba(0,0,0,.88) 55%,#000 78%),
    repeating-radial-gradient(circle,
      rgba(145,87,35,.28) 0 4px,
      rgba(50,28,14,.8) 5px 22px,
      rgba(0,0,0,.95) 23px 42px
    );
  box-shadow:inset 0 0 100px #000;
  z-index:2;
}

.passage.left{
  left:7%;
  transform:translateY(-45%) rotateY(24deg) translateZ(-220px);
}

.passage.right{
  right:7%;
  transform:translateY(-45%) rotateY(-24deg) translateZ(-220px);
}

.column{
  position:absolute;
  top:18%;
  width:70px;
  height:70vh;
  background:
    repeating-linear-gradient(90deg,
      #3a1e0c 0 8px,
      #8a5525 9px 15px,
      #1b0c04 16px 25px);
  box-shadow:
    inset 0 0 30px #000,
    0 0 35px rgba(255,120,30,.18);
  z-index:8;
}

.column:before,
.column:after{
  content:"";
  position:absolute;
  left:-18px;
  width:106px;
  height:36px;
  background:linear-gradient(to bottom,#b27838,#3b1b08);
  box-shadow:inset 0 0 18px #000;
}

.column:before{top:-28px}
.column:after{bottom:-26px}

.c1{left:19%}
.c2{right:19%}
.c3{left:34%;transform:scale(.75);top:28%;opacity:.75}
.c4{right:34%;transform:scale(.75);top:28%;opacity:.75}

.ceiling{
  position:absolute;
  top:-16%;
  left:-10%;
  width:120%;
  height:42vh;
  background:
    repeating-linear-gradient(25deg,
      rgba(140,85,35,.32) 0 6px,
      rgba(35,18,7,.88) 7px 23px,
      rgba(0,0,0,.96) 24px 48px);
  clip-path:polygon(0 0,100% 0,96% 72%,78% 90%,55% 75%,32% 94%,5% 75%);
  box-shadow:inset 0 0 120px #000;
  z-index:10;
}

.floor{
  position:absolute;
  left:50%;
  bottom:-26%;
  width:160vw;
  height:70vh;
  transform:translateX(-50%) rotateX(72deg);
  transform-origin:center bottom;
  background:
    radial-gradient(circle at 50% 18%,rgba(255,180,70,.22),transparent 20%),
    repeating-linear-gradient(90deg,
      rgba(255,210,120,.08) 0 3px,
      transparent 4px 34px),
    repeating-linear-gradient(0deg,
      rgba(120,72,30,.45) 0 6px,
      rgba(44,24,10,.9) 7px 28px,
      rgba(0,0,0,.8) 29px 52px);
  box-shadow:inset 0 0 130px #000;
  animation:floorMove 9s linear infinite;
  z-index:7;
}

@keyframes floorMove{
  from{background-position:0 0,0 0,0 0}
  to{background-position:0 0,0 180px,0 230px}
}

.torch{
  position:absolute;
  width:18px;
  height:125px;
  background:linear-gradient(to bottom,#6b3512,#1a0902);
  z-index:18;
  box-shadow:0 0 10px #000;
}

.t1{left:12%;top:45%;transform:rotate(-10deg)}
.t2{right:12%;top:45%;transform:rotate(10deg)}
.t3{left:38%;top:48%;transform:scale(.7)}
.t4{right:38%;top:48%;transform:scale(.7)}

.flame{
  position:absolute;
  top:-58px;
  left:-22px;
  width:62px;
  height:72px;
  border-radius:50% 50% 45% 45%;
  background:
    radial-gradient(circle at 50% 65%,#fff3a3 0 12%,#ffb347 24%,#ff6a00 48%,rgba(150,20,0,.35) 70%,transparent 72%);
  box-shadow:
    0 0 28px #ff9d25,
    0 0 75px rgba(255,105,15,.9),
    0 0 130px rgba(255,85,0,.55);
  animation:flicker .12s infinite alternate;
}

@keyframes flicker{
  from{transform:scale(.9) rotate(-3deg);opacity:.82}
  to{transform:scale(1.14) rotate(3deg);opacity:1}
}

.glow{
  position:absolute;
  width:420px;
  height:420px;
  border-radius:50%;
  background:radial-gradient(circle,rgba(255,125,30,.34),transparent 68%);
  filter:blur(20px);
  z-index:12;
  animation:glowPulse 1.3s ease-in-out infinite alternate;
}

.g1{left:-2%;top:28%}
.g2{right:-2%;top:28%}
.g3{left:28%;top:36%;transform:scale(.6)}
.g4{right:28%;top:36%;transform:scale(.6)}

@keyframes glowPulse{
  from{opacity:.42}
  to{opacity:.85}
}

.symbol{
  position:absolute;
  z-index:20;
  opacity:.7;
  filter:drop-shadow(0 0 5px rgba(255,140,40,.3));
}

.symbol svg{
  width:115px;
  height:115px;
  stroke:rgba(210,130,55,.82);
  fill:none;
  stroke-width:4;
}

.s-left{left:7%;top:58%;transform:rotate(-8deg)}
.s-right{right:8%;top:57%;transform:rotate(8deg)}
.s-center{left:47%;top:36%;transform:translateX(-50%) scale(.8)}

.sand{
  position:absolute;
  inset:-20%;
  background:
    radial-gradient(circle at 20% 70%,rgba(255,210,120,.06),transparent 18%),
    radial-gradient(circle at 75% 45%,rgba(255,180,90,.045),transparent 22%),
    radial-gradient(circle at 50% 85%,rgba(255,220,130,.04),transparent 25%);
  filter:blur(38px);
  opacity:.75;
  z-index:25;
  animation:sandMove 16s linear infinite alternate;
}

@keyframes sandMove{
  from{transform:translateX(-4%) translateY(2%)}
  to{transform:translateX(4%) translateY(-2%)}
}

.vignette{
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at center,transparent 16%,rgba(0,0,0,.45) 58%,#000 96%);
  z-index:40;
  pointer-events:none;
}

.start{
  position:absolute;
  inset:0;
  z-index:60;
  background:radial-gradient(circle at center,rgba(0,0,0,.12),rgba(0,0,0,.96));
  display:flex;
  align-items:center;
  justify-content:center;
  transition:opacity 1s ease,transform 1s ease;
}

.start.hidden{
  opacity:0;
  transform:scale(1.28);
  pointer-events:none;
}

.enter{
  width:130px;
  height:130px;
  border-radius:50%;
  border:1px solid rgba(255,185,85,.6);
  background:
    radial-gradient(circle,rgba(255,170,60,.28),rgba(0,0,0,.45));
  box-shadow:
    0 0 30px rgba(255,150,45,.75),
    inset 0 0 30px rgba(255,190,95,.35);
  cursor:pointer;
  animation:portalPulse 1.4s ease-in-out infinite alternate;
}

@keyframes portalPulse{
  from{transform:scale(.94);opacity:.65}
  to{transform:scale(1.08);opacity:1}
}

.scene.entering .world{
  animation:walk 5s ease-in-out forwards;
}

@keyframes walk{
  0%{transform:translateZ(0)}
  30%{transform:translateZ(220px) rotateX(1deg)}
  65%{transform:translateZ(470px) rotateX(-1deg)}
  100%{transform:translateZ(680px)}
}

.particle{
  position:absolute;
  width:4px;
  height:4px;
  border-radius:50%;
  background:rgba(255,200,115,.58);
  z-index:30;
  animation:floatParticle linear infinite;
}

@keyframes floatParticle{
  from{transform:translateY(105vh);opacity:0}
  25%{opacity:.8}
  to{transform:translateY(-20vh);opacity:0}
}

@media(max-width:700px){
  .arch{width:58vw;height:70vh}
  .passage{width:48vw;height:55vh}
  .column{width:44px}
  .symbol svg{width:80px;height:80px}
}
</style>
</head>

<body>

<div class="scene" id="scene">

  <div class="world" id="world">
    <div class="depth"></div>

    <div class="passage left"></div>
    <div class="passage right"></div>
    <div class="arch"></div>

    <div class="ceiling"></div>
    <div class="floor"></div>

    <div class="column c1"></div>
    <div class="column c2"></div>
    <div class="column c3"></div>
    <div class="column c4"></div>

    <div class="glow g1"></div>
    <div class="glow g2"></div>
    <div class="glow g3"></div>
    <div class="glow g4"></div>

    <div class="torch t1"><div class="flame"></div></div>
    <div class="torch t2"><div class="flame"></div></div>
    <div class="torch t3"><div class="flame"></div></div>
    <div class="torch t4"><div class="flame"></div></div>

    <div class="symbol s-left">
      <svg viewBox="0 0 120 120">
        <path d="M60 15 C30 25 22 55 38 80 C50 100 75 100 88 80 C104 55 90 25 60 15Z"/>
        <path d="M60 30 C45 42 45 72 60 88 C75 72 75 42 60 30Z"/>
        <circle cx="60" cy="60" r="8"/>
      </svg>
    </div>

    <div class="symbol s-right">
      <svg viewBox="0 0 120 120">
        <path d="M20 60 C35 28 85 28 100 60 C85 92 35 92 20 60Z"/>
        <circle cx="60" cy="60" r="17"/>
        <path d="M60 20 L60 100 M25 60 L95 60"/>
      </svg>
    </div>

    <div class="symbol s-center">
      <svg viewBox="0 0 120 120">
        <circle cx="60" cy="60" r="24"/>
        <path d="M60 8 L70 42 L106 42 L76 62 L88 100 L60 76 L32 100 L44 62 L14 42 L50 42Z"/>
      </svg>
    </div>
  </div>

  <div class="sand"></div>
  <div class="vignette"></div>

  <div class="start" id="start">
    <button class="enter" onclick="enterCave()" aria-label="Entrar"></button>
  </div>

</div>

<script>
const scene = document.getElementById("scene");
const world = document.getElementById("world");
const start = document.getElementById("start");

let mouseX = 0;
let mouseY = 0;
let targetX = 0;
let targetY = 0;
let entered = false;
let zDepth = 0;

function enterCave(){
  entered = true;
  start.classList.add("hidden");
  scene.classList.add("entering");

  setTimeout(()=>{
    scene.classList.remove("entering");
    zDepth = 260;
  },5000);
}

scene.addEventListener("mousemove",e=>{
  const x = (e.clientX / window.innerWidth - .5) * 2;
  const y = (e.clientY / window.innerHeight - .5) * 2;
  targetX = x * 11;
  targetY = y * -7;
});

scene.addEventListener("touchmove",e=>{
  const t = e.touches[0];
  const x = (t.clientX / window.innerWidth - .5) * 2;
  const y = (t.clientY / window.innerHeight - .5) * 2;
  targetX = x * 11;
  targetY = y * -7;
});

document.addEventListener("keydown",e=>{
  if(e.key === "Enter") enterCave();
  if(e.key === "ArrowUp") zDepth += 35;
  if(e.key === "ArrowDown") zDepth -= 35;
  if(e.key === "ArrowLeft") targetX -= 8;
  if(e.key === "ArrowRight") targetX += 8;
});

function animateCamera(){
  mouseX += (targetX - mouseX) * .05;
  mouseY += (targetY - mouseY) * .05;

  if(!scene.classList.contains("entering")){
    world.style.transform = `
      rotateY(${mouseX}deg)
      rotateX(${mouseY}deg)
      translateZ(${entered ? zDepth : 0}px)
    `;
  }

  requestAnimationFrame(animateCamera);
}

animateCamera();

function createParticles(){
  for(let i=0;i<55;i++){
    const p=document.createElement("div");
    p.className="particle";
    p.style.left=Math.random()*100+"vw";
    p.style.animationDuration=6+Math.random()*12+"s";
    p.style.animationDelay=Math.random()*8+"s";
    p.style.opacity=Math.random();
    scene.appendChild(p);
  }
}

createParticles();
</script>

</body>
</html>

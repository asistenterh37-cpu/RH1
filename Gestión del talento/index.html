<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Panel de Gestión Estratégica y del Talento</title>
  <style>
    :root{
      --bg:#07111f;
      --panel:#0b1a2f;
      --panel2:#0a172a;
      --text:#eaf2ff;
      --muted:#a8b3c7;
      --stroke:rgba(255,255,255,.12);
      --stroke2:rgba(255,255,255,.08);
      --accent:#4f7cff;
      --accent2:#22c55e;
      --shadow: 0 20px 60px rgba(0,0,0,.35);
      --r: 18px;
      --r2: 14px;
      --gap: 14px;
      --max: 1120px;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
      background:
        radial-gradient(1200px 700px at 15% 10%, rgba(79,124,255,.20), transparent 60%),
        radial-gradient(900px 600px at 80% 20%, rgba(34,197,94,.12), transparent 55%),
        linear-gradient(180deg, #061022, #050c18 55%, #050a14);
      color:var(--text);
    }

    .wrap{
      max-width: var(--max);
      margin: 0 auto;
      padding: 28px 18px 44px;
    }

    /* Header */
    .top{
      display:flex;
      align-items:center;
      gap:16px;
      justify-content:space-between;
      margin-bottom: 18px;
    }
    .brand{
      display:flex;
      align-items:center;
      gap:14px;
      min-width: 280px;
    }
    .logo{
      width:56px;height:56px;
      border-radius: 18px;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,.18), rgba(255,255,255,.06)),
                  linear-gradient(135deg, rgba(79,124,255,.45), rgba(79,124,255,.10));
      box-shadow: var(--shadow);
      border: 1px solid var(--stroke);
    }
    h1{
      margin:0;
      font-size: 28px;
      letter-spacing:.2px;
      line-height:1.1;
    }
    .subtitle{
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 15px;
    }

    .right{
      display:flex;
      align-items:center;
      gap:12px;
      justify-content:flex-end;
      flex:1;
    }

    .search{
      position:relative;
      flex: 1;
      max-width: 560px;
    }
    .search input{
      width:100%;
      padding: 14px 98px 14px 44px;
      border-radius: 999px;
      background: rgba(255,255,255,.05);
      border: 1px solid var(--stroke);
      outline: none;
      color: var(--text);
      font-size: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,.25);
    }
    .search input:focus{
      border-color: rgba(79,124,255,.55);
      box-shadow: 0 0 0 4px rgba(79,124,255,.18), 0 16px 40px rgba(0,0,0,.28);
    }
    .mag{
      position:absolute;
      left:16px; top:50%;
      transform:translateY(-50%);
      opacity:.8;
      font-size: 18px;
    }
    .kbd{
      position:absolute;
      right: 12px; top:50%;
      transform:translateY(-50%);
      display:flex;
      gap:6px;
      align-items:center;
      color: rgba(234,242,255,.8);
      font-size: 13px;
      user-select:none;
    }
    .kbd span{
      border:1px solid var(--stroke2);
      background: rgba(255,255,255,.06);
      padding: 4px 8px;
      border-radius: 10px;
      font-weight: 600;
    }

    .pill{
      border:1px solid var(--stroke);
      background: rgba(255,255,255,.04);
      padding: 10px 12px;
      border-radius: 999px;
      color: rgba(234,242,255,.88);
      font-size: 14px;
      white-space:nowrap;
    }

    /* Sections */
    .section{
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      border: 1px solid var(--stroke);
      border-radius: 22px;
      box-shadow: var(--shadow);
      padding: 18px;
      margin-top: 16px;
    }
    .sectionTitle{
      margin: 0 0 12px;
      font-size: 34px;
      letter-spacing:.2px;
      color: rgba(255,255,255,.96);
    }

    .grid{
      display:grid;
      grid-template-columns: repeat(3, minmax(0,1fr));
      gap: var(--gap);
    }
    @media (max-width: 980px){
      .grid{grid-template-columns: repeat(2, minmax(0,1fr));}
      .top{flex-wrap:wrap; justify-content:flex-start;}
      .right{width:100%; justify-content:space-between;}
      .search{max-width:none;}
    }
    @media (max-width: 620px){
      .grid{grid-template-columns: 1fr;}
      .sectionTitle{font-size: 28px;}
    }

    /* Card = botón (solo nombre) */
    .card{
      width:100%;
      text-align:left;
      cursor:pointer;

      position:relative;
      border-radius: 18px;
      border: 1px solid var(--stroke);
      background: rgba(7,17,31,.55);
      padding: 16px 14px;
      overflow:hidden;
      transition: transform .15s ease, border-color .15s ease, background .15s ease;
      outline:none;
    }
    .card:hover{
      transform: translateY(-2px);
      border-color: rgba(79,124,255,.42);
      background: rgba(7,17,31,.62);
    }
    .card:focus-visible{
      box-shadow: 0 0 0 4px rgba(79,124,255,.20), 0 16px 40px rgba(0,0,0,.28);
      border-color: rgba(79,124,255,.60);
    }
    .nameRow{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 12px;
    }
    .name{
      margin:0;
      font-size: 16px;
      line-height: 1.25;
      letter-spacing:.2px;
      font-weight: 800;
    }
    .chev{
      opacity:.85;
      font-size: 16px;
      transform: translateX(0);
      transition: transform .15s ease, opacity .15s ease;
      user-select:none;
    }
    .card:hover .chev{
      transform: translateX(2px);
      opacity: 1;
    }

    /* Quick tip */
    .tip{
      display:flex;
      gap:12px;
      align-items:flex-start;
      color: var(--muted);
      font-size: 14px;
    }
    .tip strong{
      color: rgba(234,242,255,.92);
      font-weight: 800;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="top">
      <div class="brand">
        <div class="logo" aria-hidden="true"></div>
        <div>
          <h1>Panel de Gestión Estratégica y del Talento</h1>
          <p class="subtitle">Acceso rápido a tus módulos (solo nombres; los links van “bajo el capó” 😄).</p>
        </div>
      </div>

      <div class="right">
        <div class="search">
          <div class="mag" aria-hidden="true">🔎</div>
          <input id="searchInput" type="text" placeholder="Buscar módulo… (ej: clima, puestos, evaluación)" autocomplete="off" />
          <div class="kbd" title="Atajo">
            <span>Ctrl</span><span>K</span>
          </div>
        </div>
        <div class="pill" id="countPill">Módulos: 0 / 0</div>
      </div>
    </div>

    <section class="section">
      <h2 class="sectionTitle">Centro de control</h2>
      <div class="grid" id="modulesGrid"></div>
    </section>

    <section class="section">
      <h2 class="sectionTitle">Tip rápido</h2>
      <div class="tip">
        <div style="font-size:18px;line-height:1">💡</div>
        <div>
          Presiona <strong>Ctrl</strong> + <strong>K</strong> para ir directo al buscador. Entre menos clics, más vida.
        </div>
      </div>
    </section>
  </div>

  <script>
    // =========================
    // 1) CONFIG: módulos
    // =========================
    // ✅ SOLO se muestran los NOMBRES en el panel.
    // ✅ Los enlaces NO se muestran: se abren al hacer click en el módulo.
    const modules = [
      { title: "Planificación estratégica", url: "https://asistenterh37-cpu.github.io/RH1/planificacion-estrategica/" },
      { title: "Clima laboral", url: "https://asistenterh37-cpu.github.io/RH1/Clima-Organizacional/" },
      { title: "Descripción de puestos", url: "https://asistenterh37-cpu.github.io/RH1/Descripcion-de-puestos/" },
      { title: "Valoración de puestos", url: "https://asistenterh37-cpu.github.io/RH1/Valoracion%20de%20puestos/" },
      { title: "Evaluación del desempeño I", url: "https://asistenterh37-cpu.github.io/RH1/Evaluaci%C3%B3n-Desempe%C3%B1o-F/" },
      { title: "Resumen (Dashboard)", url: "https://script.google.com/macros/s/AKfycbwcu64v7aRoYTDzBL_egOwcBm5vvp2TFIVbwFj3M1R70mCj_Mb6tIILdN2T8vvCX1iVC/exec" }
    ];

    // =========================
    // 2) Render
    // =========================
    const grid = document.getElementById("modulesGrid");
    const searchInput = document.getElementById("searchInput");
    const countPill = document.getElementById("countPill");

    function escapeHtml(str){
      return String(str).replace(/[&<>"']/g, s => ({
        "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
      }[s]));
    }

    function openModule(url){
      // Abre en pestaña nueva sin exponer el link en el UI
      window.open(url, "_blank", "noopener,noreferrer");
    }

    function render(list){
      grid.innerHTML = "";
      const total = modules.length;
      const visible = list.length;
      countPill.textContent = `Módulos: ${visible} / ${total}`;

      if(!visible){
        grid.innerHTML = `
          <button class="card" type="button" style="grid-column:1/-1;" disabled>
            <div class="nameRow">
              <h3 class="name">Sin resultados</h3>
              <span class="chev" aria-hidden="true">🤷‍♀️</span>
            </div>
          </button>
        `;
        return;
      }

      for(const m of list){
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "card";
        btn.setAttribute("aria-label", `Abrir módulo: ${m.title}`);
        btn.innerHTML = `
          <div class="nameRow">
            <h3 class="name">${escapeHtml(m.title || "Módulo")}</h3>
            <span class="chev" aria-hidden="true">➜</span>
          </div>
        `;
        btn.addEventListener("click", () => openModule(m.url));
        grid.appendChild(btn);
      }
    }

    function filterModules(q){
      const s = q.trim().toLowerCase();
      if(!s) return modules;
      return modules.filter(m => (m.title || "").toLowerCase().includes(s));
    }

    // initial render
    render(modules);

    // search listener
    searchInput.addEventListener("input", () => {
      render(filterModules(searchInput.value));
    });

    // Ctrl + K focus
    window.addEventListener("keydown", (e) => {
      if((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === "k"){
        e.preventDefault();
        searchInput.focus();
      }
    });
  </script>
</body>
</html>

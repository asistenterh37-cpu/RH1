<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Panel de Gestión Estratégica y del Talento</title>
  <style>
    :root{
      --bg:#07111f;
      --panel:#0b1a2f;
      --panel2:#0a172a;
      --text:#eaf2ff;
      --muted:#a8b3c7;
      --stroke:rgba(255,255,255,.12);
      --stroke2:rgba(255,255,255,.08);
      --accent:#4f7cff;
      --accent2:#22c55e;
      --shadow: 0 20px 60px rgba(0,0,0,.35);
      --r: 18px;
      --r2: 14px;
      --gap: 14px;
      --max: 1120px;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
      background:
        radial-gradient(1200px 700px at 15% 10%, rgba(79,124,255,.20), transparent 60%),
        radial-gradient(900px 600px at 80% 20%, rgba(34,197,94,.12), transparent 55%),
        linear-gradient(180deg, #061022, #050c18 55%, #050a14);
      color:var(--text);
    }

    .wrap{
      max-width: var(--max);
      margin: 0 auto;
      padding: 28px 18px 44px;
    }

    /* Header */
    .top{
      display:flex;
      align-items:center;
      gap:16px;
      justify-content:space-between;
      margin-bottom: 18px;
    }
    .brand{
      display:flex;
      align-items:center;
      gap:14px;
      min-width: 280px;
    }
    .logo{
      width:56px;height:56px;
      border-radius: 18px;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,.18), rgba(255,255,255,.06)),
                  linear-gradient(135deg, rgba(79,124,255,.45), rgba(79,124,255,.10));
      box-shadow: var(--shadow);
      border: 1px solid var(--stroke);
    }
    h1{
      margin:0;
      font-size: 28px;
      letter-spacing:.2px;
      line-height:1.1;
    }
    .subtitle{
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 15px;
    }

    .right{
      display:flex;
      align-items:center;
      gap:12px;
      justify-content:flex-end;
      flex:1;
    }

    .search{
      position:relative;
      flex: 1;
      max-width: 560px;
    }
    .search input{
      width:100%;
      padding: 14px 98px 14px 44px;
      border-radius: 999px;
      background: rgba(255,255,255,.05);
      border: 1px solid var(--stroke);
      outline: none;
      color: var(--text);
      font-size: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,.25);
    }
    .search input:focus{
      border-color: rgba(79,124,255,.55);
      box-shadow: 0 0 0 4px rgba(79,124,255,.18), 0 16px 40px rgba(0,0,0,.28);
    }
    .mag{
      position:absolute;
      left:16px; top:50%;
      transform:translateY(-50%);
      opacity:.8;
      font-size: 18px;
    }
    .kbd{
      position:absolute;
      right: 12px; top:50%;
      transform:translateY(-50%);
      display:flex;
      gap:6px;
      align-items:center;
      color: rgba(234,242,255,.8);
      font-size: 13px;
      user-select:none;
    }
    .kbd span{
      border:1px solid var(--stroke2);
      background: rgba(255,255,255,.06);
      padding: 4px 8px;
      border-radius: 10px;
      font-weight: 600;
    }

    .pill{
      border:1px solid var(--stroke);
      background: rgba(255,255,255,.04);
      padding: 10px 12px;
      border-radius: 999px;
      color: rgba(234,242,255,.88);
      font-size: 14px;
      white-space:nowrap;
    }

    /* Sections */
    .section{
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      border: 1px solid var(--stroke);
      border-radius: 22px;
      box-shadow: var(--shadow);
      padding: 18px;
      margin-top: 16px;
    }
    .sectionTitle{
      margin: 0 0 12px;
      font-size: 34px;
      letter-spacing:.2px;
      color: rgba(255,255,255,.96);
    }

    .grid{
      display:grid;
      grid-template-columns: repeat(3, minmax(0,1fr));
      gap: var(--gap);
    }
    @media (max-width: 980px){
      .grid{grid-template-columns: repeat(2, minmax(0,1fr));}
      .top{flex-wrap:wrap; justify-content:flex-start;}
      .right{width:100%; justify-content:space-between;}
      .search{max-width:none;}
    }
    @media (max-width: 620px){
      .grid{grid-template-columns: 1fr;}
      .sectionTitle{font-size: 28px;}
    }

    .card{
      position:relative;
      border-radius: 18px;
      border: 1px solid var(--stroke);
      background: rgba(7,17,31,.55);
      padding: 14px 14px 14px;
      overflow:hidden;
      transition: transform .15s ease, border-color .15s ease;
    }
    .card:hover{
      transform: translateY(-2px);
      border-color: rgba(79,124,255,.42);
    }
    .cardTop{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap: 12px;
      margin-bottom: 10px;
    }
    .name{
      margin:0;
      font-size: 16px;
      line-height: 1.2;
      letter-spacing:.2px;
    }
    .tag{
      font-size: 12px;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid var(--stroke2);
      background: rgba(255,255,255,.06);
      color: rgba(234,242,255,.85);
      white-space:nowrap;
    }
    .desc{
      margin: 0 0 12px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }
    .actions{
      display:flex;
      gap:10px;
      align-items:center;
    }
    .btn{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid var(--stroke);
      background: rgba(79,124,255,.14);
      color: var(--text);
      text-decoration:none;
      font-weight: 700;
      font-size: 13px;
      transition: transform .12s ease, background .12s ease, border-color .12s ease;
    }
    .btn:hover{
      transform: translateY(-1px);
      border-color: rgba(79,124,255,.55);
      background: rgba(79,124,255,.20);
    }
    .btn.secondary{
      background: rgba(255,255,255,.06);
    }
    .btn.secondary:hover{
      border-color: rgba(255,255,255,.18);
      background: rgba(255,255,255,.09);
    }

    /* Quick tip */
    .tip{
      display:flex;
      gap:12px;
      align-items:flex-start;
      color: var(--muted);
      font-size: 14px;
    }
    .tip strong{
      color: rgba(234,242,255,.92);
      font-weight: 800;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="top">
      <div class="brand">
        <div class="logo" aria-hidden="true"></div>
        <div>
          <h1>Panel de Gestión Estratégica y del Talento</h1>
          <p class="subtitle">Acceso rápido a tus módulos (y sí, aquí manda el orden... no el caos 😄).</p>
        </div>
      </div>

      <div class="right">
        <div class="search">
          <div class="mag" aria-hidden="true">🔎</div>
          <input id="searchInput" type="text" placeholder="Buscar módulo… (ej: clima, puestos, evaluación)" autocomplete="off" />
          <div class="kbd" title="Atajo">
            <span>Ctrl</span><span>K</span>
          </div>
        </div>
        <div class="pill" id="countPill">Módulos: 0 / 0</div>
      </div>
    </div>

    <!-- Centro de control (texto y botones eliminados) -->
    <section class="section">
      <h2 class="sectionTitle">Centro de control</h2>
      <!-- ✅ Aquí ya NO va el texto largo ni los 3 botones -->
      <div class="grid" id="modulesGrid"></div>
    </section>

    <section class="section">
      <h2 class="sectionTitle">Tip rápido</h2>
      <div class="tip">
        <div style="font-size:18px;line-height:1">💡</div>
        <div>
          Presiona <strong>Ctrl</strong> + <strong>K</strong> para ir directo al buscador. Entre menos clics, más vida.
        </div>
      </div>
    </section>
  </div>

  <script>
    // =========================
    // 1) CONFIG: módulos
    // =========================
    // ✅ Si tu proyecto ya tenía este arreglo, pega tus módulos aquí.
    // ✅ NOTA: Quité "Copiar link", así que no hay botones de copiado.
    const modules = [
      {
        title: "Valoración de puestos",
        desc: "Herramienta para evaluar y valorar puestos por factores y ponderaciones.",
        url: "https://asistenterh37-cpu.github.io/Juegos/Valoracion%20de%20puestos/",
        badge: "Herramienta"
      },
      {
        title: "Gestión del talento",
        desc: "Panel de módulos de talento (este).",
        url: "https://asistenterh37-cpu.github.io/RH1/Gesti%C3%B3n%20del%20talento/",
        badge: "Panel"
      },
      // Agrega el resto de tus módulos aquí...
    ];

    // =========================
    // 2) Render
    // =========================
    const grid = document.getElementById("modulesGrid");
    const searchInput = document.getElementById("searchInput");
    const countPill = document.getElementById("countPill");

    function escapeHtml(str){
      return String(str).replace(/[&<>"']/g, s => ({
        "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
      }[s]));
    }

    function render(list){
      grid.innerHTML = "";
      const total = modules.length;
      const visible = list.length;
      countPill.textContent = `Módulos: ${visible} / ${total}`;

      if(!visible){
        grid.innerHTML = `
          <div class="card" style="grid-column:1/-1;">
            <h3 class="name">Sin resultados</h3>
            <p class="desc">Prueba con otra palabra (o revisa si el módulo anda escondiéndose).</p>
          </div>
        `;
        return;
      }

      for(const m of list){
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
          <div class="cardTop">
            <h3 class="name">${escapeHtml(m.title || "Módulo")}</h3>
            <div class="tag">${escapeHtml(m.badge || "Módulo")}</div>
          </div>
          ${m.desc ? `<p class="desc">${escapeHtml(m.desc)}</p>` : ``}
          <div class="actions">
            <a class="btn" href="${escapeHtml(m.url)}" target="_blank" rel="noopener noreferrer">➡️ Abrir</a>
            <a class="btn secondary" href="${escapeHtml(m.url)}" target="_blank" rel="noopener noreferrer">🔗 Ver link</a>
          </div>
        `;
        grid.appendChild(card);
      }
    }

    function filterModules(q){
      const s = q.trim().toLowerCase();
      if(!s) return modules;
      return modules.filter(m => {
        const hay = `${m.title||""} ${m.desc||""} ${m.badge||""}`.toLowerCase();
        return hay.includes(s);
      });
    }

    // initial render
    render(modules);

    // search listener
    searchInput.addEventListener("input", () => {
      render(filterModules(searchInput.value));
    });

    // Ctrl + K focus
    window.addEventListener("keydown", (e) => {
      if((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === "k"){
        e.preventDefault();
        searchInput.focus();
      }
    });
  </script>
</body>
</html>

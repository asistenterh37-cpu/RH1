<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Cálculo de prestaciones - Al final/title>
  <style>
    :root{
      --bg:#0b1220; --panel:#111a2e; --panel2:#0f1730;
      --text:#e9eefc; --muted:#a9b4d6; --line:rgba(255,255,255,.08);
      --ok:#22c55e; --warn:#f59e0b;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: system-ui,-apple-system,Segoe UI,Roboto,Arial;
      background: radial-gradient(1200px 600px at 10% 10%, #1a2a6b55, transparent 60%),
                  radial-gradient(900px 500px at 90% 15%, #b21f1f33, transparent 55%),
                  radial-gradient(900px 500px at 60% 90%, #0f9b0f22, transparent 55%),
                  var(--bg);
      color:var(--text);
      line-height: 1;
      font-size: 16px;
    }

    /* Más compacto */
    .wrap{max-width:980px;margin:22px auto;padding:0 14px}
    .card{
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      border:1px solid var(--line);
      border-radius:18px;
      padding:12px;                 /* antes 14 */
      box-shadow: 0 12px 40px rgba(0,0,0,.25);
    }
    h1{margin:0 0 5px;font-size:22px}
    .sub{color:var(--muted);font-size:15px;margin-bottom:10px} /* antes 12 */

    .grid{display:grid;grid-template-columns:1fr;gap:10px}     /* antes 12 */
    @media(min-width:860px){ .grid{grid-template-columns:1.1fr .9fr} }

    /* Panel base (más apretado) */
    .panel{
      background: rgba(0,0,0,.15);
      border:1px solid var(--line);
      border-radius:16px;
      padding:10px;                 /* antes 12 */
    }
    .panel h2{font-size:16px;margin:0 0 6px;color:#d6dcf3}     /* antes 8 */

    /* Paneles remarcados */
    .panel.inputs{
      border: 1.5px solid rgba(245,158,11,.35);
      box-shadow:
        0 0 0 2px rgba(245,158,11,.14),
        0 14px 34px rgba(0,0,0,.28);
      background: linear-gradient(180deg, rgba(245,158,11,.06), rgba(0,0,0,.14));
    }
    .panel.outputs{
      border: 1.5px solid rgba(34,197,94,.35);
      box-shadow:
        0 0 0 2px rgba(34,197,94,.14),
        0 14px 34px rgba(0,0,0,.28);
      background: linear-gradient(180deg, rgba(34,197,94,.06), rgba(0,0,0,.14));
    }

    /* ======= Más compacto: “Marco” individual por campo ======= */
    .fieldBox{
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 12px;          /* antes 14 */
      padding: 6px 8px;             /* antes 8px 10px */
      margin: 4px 0;                /* antes 6px 0 */
      background: rgba(0,0,0,.12);
      box-shadow: inset 0 0 0 1px rgba(0,0,0,.12);
    }

    /* Marcos diferenciados por sección */
    .inputs .fieldBox{
      border-color: rgba(245,158,11,.28);
      background: linear-gradient(180deg, rgba(245,158,11,.05), rgba(0,0,0,.12));
    }
    .outputs .fieldBox{
      border-color: rgba(34,197,94,.28);
      background: linear-gradient(180deg, rgba(34,197,94,.05), rgba(0,0,0,.12));
    }

    /* Layout dentro del marco (gap más corto) */
    .fieldRow{
      display:grid;
      grid-template-columns: 1.3fr 1fr;
      gap:8px;                      /* antes 10 */
      align-items:center;
    }

    label{color:var(--muted); font-size:15px}

    input, select{
      width:100%;
      padding:6px 9px;              /* antes 7px 10px */
      border-radius:10px;           /* antes 12 */
      border:1px solid var(--line);
      background:rgba(17,26,46,.65);
      color:var(--text);
      outline:none;
      font-size: 15px;
      line-height: 1;
    }

    /* Focus más evidente + “halo” según sección */
    .inputs input:focus, .inputs select:focus{
      border-color: rgba(245,158,11,.45);
      box-shadow: 0 0 0 2px rgba(245,158,11,.12);
    }
    .outputs input:focus{
      border-color: rgba(34,197,94,.45);
      box-shadow: 0 0 0 2px rgba(34,197,94,.12);
    }

    input[readonly]{
      opacity:.92;
      background: rgba(15,23,48,.75);
    }

    .hint{
      font-size:14px;
      color:var(--muted);
      margin-top:8px;
      line-height:1;
    }
    .mini{font-size:14px;color:var(--muted); line-height:1; margin-top:2px} /* compacta listita */

    .btnbar{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px} /* antes 10 */

    button{
      border:none;
      border-radius:12px;
      padding:8px 12px;             /* antes 9px 14px */
      background:#2f6fed;
      color:white;
      font-weight:700;
      cursor:pointer;
      box-shadow: 0 10px 25px rgba(47,111,237,.22);
      font-size: 15px;
      line-height: 1;
    }
    button.secondary{background:rgba(255,255,255,.08);box-shadow:none}

    .pill{
      display:inline-flex;gap:8px;align-items:center;
      padding:4px 9px;              /* antes 5px 10px */
      border-radius:999px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.05);
      font-size:14px;
      color:var(--muted);
      margin-bottom:6px;            /* antes 8 */
      line-height:1;
    }
    .dot{width:8px;height:8px;border-radius:999px;background:var(--warn)}
    .dot.ok{background:var(--ok)}

    /* Tabla más compacta */
    .table{
      width:100%;
      border-collapse:separate;
      border-spacing:0;
      overflow:hidden;
      border-radius:14px;
      border:1px solid var(--line);
      background: rgba(0,0,0,.10);
    }
    .table th,.table td{
      padding:7px 9px;              /* antes 8px 10px */
      border-bottom:1px solid var(--line);
      font-size:15px;
      line-height: 1;
      vertical-align: middle;
    }
    .table th{color:#d7def6;text-align:left;background:rgba(255,255,255,.05)}
    .table tr:last-child td{border-bottom:none}
    .right{text-align:right}

    .table input{
      padding:6px 9px;              /* antes 6px 10px */
      border-radius:10px;           /* antes 12 */
      font-size:15px;
      line-height:1;
    }

    /* IMPORTANTE: en outputs, el fieldBox dentro de la tabla se ve más grande por el padding.
       Lo apretamos aún más en ese caso específico. */
    .table .fieldBox{
      padding:4px 6px;
      margin:0;
      border-radius:12px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Plan de Retiro — Escenario</h1>
      <div class="sub">Campos No. <b>1</b> = ingresados · Campos No. <b>2</b> = calculados (se llenan con <b>Calcular</b>)</div>

      <div class="grid">

        <!-- Inputs -->
        <div class="panel inputs">
          <div class="pill"><span class="dot"></span> Entradas (No. 1)</div>
          <h2>Datos base</h2>

          <div class="fieldBox">
            <div class="fieldRow">
              <label for="sueldoActual">Sueldo actual (HNL)</label>
              <input id="sueldoActual" type="number" step="0.01" value="20000" />
            </div>
          </div>

          <div class="fieldBox">
            <div class="fieldRow">
              <label for="antiguedad">Antigüedad actual (años)</label>
              <input id="antiguedad" type="number" step="0.01" value="8" />
            </div>
          </div>

          <div class="fieldBox">
            <div class="fieldRow">
              <label for="edadActual">Edad actual (años)</label>
              <input id="edadActual" type="number" step="1" value="50" />
            </div>
          </div>

          <div class="fieldBox">
            <div class="fieldRow">
              <label for="genero">Género</label>
              <select id="genero">
                <option value="masculino" selected>Masculino</option>
                <option value="femenino">Femenino</option>
              </select>
            </div>
          </div>

          <div class="fieldBox">
            <div class="fieldRow">
              <label for="incAnual">Inc % Anual (ej: 0.05 = 5%)</label>
              <input id="incAnual" type="number" step="0.0001" value="0.05" />
            </div>
          </div>

          <div class="btnbar">
            <button id="btnCalcular">Calcular</button>
            <button class="secondary" id="btnLimpiar" type="button">Limpiar</button>
          </div>

          <div class="hint">
            Fórmulas replicadas de tu hoja “Escenario”:
            <div class="mini">• Sueldo promedio actual = Sueldo * 13 / 12</div>
            <div class="mini">• Edad retiro = (femenino → 60, si no → 65)</div>
            <div class="mini">• Antigüedad esperada = (Edad retiro − Edad actual) + Antigüedad actual</div>
            <div class="mini">• Antigüedad cálculo = IF(Antigüedad esperada &gt; 25, 27, Antigüedad esperada + 2)</div>
            <div class="mini">• Años hacia adelante = Edad retiro − Edad actual</div>
            <div class="mini">• Factor actuarial = (1 + Inc% Anual) ^ (Años hacia adelante)</div>
            <div class="mini">• Sueldo promedio futuro = Sueldo prom. actual * Factor</div>
            <div class="mini">• Prestaciones futuras = Antigüedad cálculo * Sueldo prom. futuro</div>
          </div>
        </div>

        <!-- Outputs -->
        <div class="panel outputs">
          <div class="pill"><span class="dot ok"></span> Calculados (No. 2)</div>
          <h2>Resultados</h2>

          <table class="table">
            <thead>
              <tr>
                <th>Concepto</th>
                <th class="right">Valor</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>Sueldo promedio actual</td>
                <td class="right">
                  <div class="fieldBox">
                    <input id="sueldoPromActual" readonly />
                  </div>
                </td>
              </tr>
              <tr>
                <td>Edad retiro</td>
                <td class="right">
                  <div class="fieldBox">
                    <input id="edadRetiro" readonly />
                  </div>
                </td>
              </tr>
              <tr>
                <td>Antigüedad esperada</td>
                <td class="right">
                  <div class="fieldBox">
                    <input id="antiguedadEsperada" readonly />
                  </div>
                </td>
              </tr>
              <tr>
                <td>Antigüedad cálculo</td>
                <td class="right">
                  <div class="fieldBox">
                    <input id="antiguedadCalculo" readonly />
                  </div>
                </td>
              </tr>
              <tr>
                <td>Años hacia adelante</td>
                <td class="right">
                  <div class="fieldBox">
                    <input id="anosAdelante" readonly />
                  </div>
                </td>
              </tr>
              <tr>
                <td>Factor</td>
                <td class="right">
                  <div class="fieldBox">
                    <input id="factor" readonly />
                  </div>
                </td>
              </tr>
              <tr>
                <td>Sueldo promedio futuro</td>
                <td class="right">
                  <div class="fieldBox">
                    <input id="sueldoPromFuturo" readonly />
                  </div>
                </td>
              </tr>
              <tr>
                <td>Prestaciones futuras</td>
                <td class="right">
                  <div class="fieldBox">
                    <input id="prestacionesFuturas" readonly />
                  </div>
                </td>
              </tr>
            </tbody>
          </table>

          <div class="hint">
            <b>Tip:</b> Si “Inc % Anual” te suena a dieta (0.05), tranqui: aquí engorda el sueldo, no vos. 😄
          </div>
        </div>

      </div>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);

    const fmtMoney = new Intl.NumberFormat("es-HN", { style: "currency", currency: "HNL" });
    const fmtNum   = new Intl.NumberFormat("es-HN", { maximumFractionDigits: 6 });

    function toNum(v){
      const n = Number(v);
      return Number.isFinite(n) ? n : 0;
    }

    function calc(){
      const sueldoActual = toNum($("sueldoActual").value);
      const antiguedad   = toNum($("antiguedad").value);
      const edadActual   = toNum($("edadActual").value);
      const genero       = ($("genero").value || "").toLowerCase().trim();
      const incAnual     = toNum($("incAnual").value);

      const sueldoPromActual = sueldoActual * 13 / 12;
      const edadRetiro = (genero === "femenino") ? 60 : 65;
      const anosAdelante = edadRetiro - edadActual;
      const antiguedadEsperada = anosAdelante + antiguedad;
      const antiguedadCalculo = (antiguedadEsperada > 25) ? 27 : (antiguedadEsperada + 2);
      const factor = Math.pow(1 + incAnual, anosAdelante);
      const sueldoPromFuturo = sueldoPromActual * factor;
      const prestacionesFuturas = antiguedadCalculo * sueldoPromFuturo;

      $("sueldoPromActual").value    = fmtMoney.format(sueldoPromActual);
      $("edadRetiro").value          = fmtNum.format(edadRetiro);
      $("antiguedadEsperada").value  = fmtNum.format(antiguedadEsperada);
      $("antiguedadCalculo").value   = fmtNum.format(antiguedadCalculo);
      $("anosAdelante").value        = fmtNum.format(anosAdelante);
      $("factor").value              = fmtNum.format(factor);
      $("sueldoPromFuturo").value    = fmtMoney.format(sueldoPromFuturo);
      $("prestacionesFuturas").value = fmtMoney.format(prestacionesFuturas);
    }

    function clearAll(){
      $("sueldoActual").value = "";
      $("antiguedad").value   = "";
      $("edadActual").value   = "";
      $("genero").value       = "masculino";
      $("incAnual").value     = "";

      $("sueldoPromActual").value    = "";
      $("edadRetiro").value          = "";
      $("antiguedadEsperada").value  = "";
      $("antiguedadCalculo").value   = "";
      $("anosAdelante").value        = "";
      $("factor").value              = "";
      $("sueldoPromFuturo").value    = "";
      $("prestacionesFuturas").value = "";
    }

    $("btnCalcular").addEventListener("click", (e)=>{ e.preventDefault(); calc(); });
    $("btnLimpiar").addEventListener("click", (e)=>{ e.preventDefault(); clearAll(); });

    calc();
  </script>
</body>
</html>

}

.purple {

}

}

.gray {
  background: #475569;
}

.gray:hover {
  background: #334155;
}

.plus-btn,
.delete-btn {

  border-radius: 50%;

.plus-btn {

}

}

#pantallaSalida button {

/*
 El mapa se mantiene disponible para Google Maps,
 pero fuera del área visible.
*/
#map {

<body>

<div class="container">

  <div class="automation-row">

<script>
let map;
let geocoder;
let Place;

let resultados = [];
let mapsListo = false;
let buscando = false;

const automatizaciones = [
  {
    titulo: "Descripción de puestos",
    descripcion: "Este módulo permite recopilar y documentar de manera estructurada la información necesaria para elaborar descripciones de puesto dentro de la organización."
  },
  {
    titulo: "Reclutamiento",
    descripcion: "Automatiza y centraliza el proceso de reclutamiento y selección de personal."
  },
  {
    titulo: "Marco normativo",
    descripcion: "Centraliza políticas, normas y procedimientos institucionales."
  },
  {
    titulo: "Evaluación del desempeño",
    descripcion: "Centraliza medición, seguimiento y desarrollo del talento humano."
  },
  {
    titulo: "Mapeo del talento",
    descripcion: "Permite evaluar y clasificar talento mediante rendimiento y potencial."
  },
  {
    titulo: "Administración de salarios",
    descripcion: "Permite analizar y gestionar estructuras de compensación."
  },
  {
    titulo: "Clima laboral",
    descripcion: "Permite medir y analizar el clima laboral mediante encuestas y dashboards."
  },
  {
    titulo: "Expedientes de personal",
    descripcion: "Administra el expediente digital del colaborador."
  },
  {
    titulo: "Compensación variable",
    descripcion: "Automatiza el cálculo de bonos."
  },
  {
    titulo: "Plan de retiro",
    descripcion: "Calcula y proyecta el costo futuro de prestaciones laborales."
  },
  {
    titulo: "Automatización de procesos con IA",
    descripcion: "Automatiza procesos administrativos mediante inteligencia artificial."
  },
  {
    titulo: "Contáctame",
    descripcion: "Puedo llevar tu organización a otro nivel. WhatsApp: 9879 0377",
    contacto: true
  }
];

/* =====================================================
   INICIALIZACIÓN DE GOOGLE MAPS
===================================================== */

async function initMap() {
  try {
    const [
      { Map },
      { Geocoder },
      { Place: PlaceClass }
    ] = await Promise.all([
      google.maps.importLibrary("maps"),
      google.maps.importLibrary("geocoding"),
      google.maps.importLibrary("places")
    ]);

    Place = PlaceClass;

    map = new Map(document.getElementById("map"), {
      center: {
        lat: 15.5,
        lng: -88.03
      },
      zoom: 8
    });

    geocoder = new Geocoder();
    mapsListo = true;

    setEstadoGeneral("Resultados: 0");

  } catch (error) {
    console.error("Error iniciando Google Maps:", error);

    mapsListo = false;

    setEstadoGeneral(
      "Error cargando Google Maps: " +
      obtenerMensajeError(error)
    );
  }
}

function googleMapsError() {
  mapsListo = false;

  setEstadoGeneral(
    "No cargó Google Maps. Revisa tu clave y las APIs habilitadas."
  );

  alert(
    "No cargó Google Maps. Revisa la API Key, " +
    "la facturación y las restricciones del dominio."
  );
}

/* =====================================================
   MODAL DE AUTOMATIZACIONES
===================================================== */

function abrirAutomatizaciones() {
  const contenedor = document.getElementById(
    "listaAutomatizaciones"
  );

  contenedor.innerHTML = "";

  automatizaciones.forEach(item => {
    const div = document.createElement("div");

    div.className = item.contacto
      ? "card-auto contact-card"
      : "card-auto";

    div.innerHTML = `
      <h3>${escapeHtml(item.titulo)}</h3>
      <p>${escapeHtml(item.descripcion)}</p>
    `;

    contenedor.appendChild(div);
  });

  document.getElementById(
    "modalAutomatizaciones"
  ).style.display = "block";
}

function cerrarAutomatizaciones() {
  document.getElementById(
    "modalAutomatizaciones"
  ).style.display = "none";
}

window.onclick = function(evento) {
  const modal = document.getElementById(
    "modalAutomatizaciones"
  );

  if (evento.target === modal) {
    cerrarAutomatizaciones();
  }
};

/* =====================================================
   ESTADOS
===================================================== */

function setEstadoGeneral(texto) {
  document.getElementById(
    "estadoGeneral"
  ).innerText = texto;
}

function setEstadoFila(fila, valor) {
  agregarOpcionEstado(fila, valor);
  fila.querySelector(".estado").value = valor;
}

function agregarOpcionEstado(fila, valor) {
  const select = fila.querySelector(".estado");

  const existe = Array.from(select.options).some(
    opcion => opcion.value === valor
  );

  if (!existe) {
    const opcion = document.createElement("option");

    opcion.value = valor;
    opcion.textContent = valor;

    select.appendChild(opcion);
  }
}

/* =====================================================
   FILAS DE BÚSQUEDA
===================================================== */

function agregarBusqueda() {
  const filas = document.querySelectorAll(
    "#tbodyBusquedas tr"
  );

  const ultimaFila = filas[filas.length - 1];

  const ciudad = ultimaFila
    .querySelector(".ciudad").value;

  const departamento = ultimaFila
    .querySelector(".departamento").value;

  const pais = ultimaFila
    .querySelector(".pais").value;

  const radioKm = ultimaFila
    .querySelector(".radioKm").value;

  const fila = document.createElement("tr");

  fila.innerHTML = `
    <td>
      <input
        class="busqueda"
        placeholder="Nueva búsqueda"
      >
    </td>

    <td>
      <input
        class="ciudad"
        value="${escapeAttr(ciudad)}"
      >
    </td>

    <td>
      <input
        class="departamento"
        value="${escapeAttr(departamento)}"
      >
    </td>

    <td>
      <input
        class="pais"
        value="${escapeAttr(pais)}"
      >
    </td>

    <td>
      <input
        class="radioKm"
        type="number"
        value="${escapeAttr(radioKm)}"
        min="1"
        max="50"
      >
    </td>

    <td>
      <select class="estado">
        <option value="Pendiente" selected>
          Pendiente
        </option>

        <option value="Procesando">
          Procesando
        </option>

        <option value="Procesado">
          Procesado
        </option>

        <option value="Sin resultados">
          Sin resultados
        </option>

        <option value="Error">
          Error
        </option>
      </select>
    </td>

    <td>
      <button
        type="button"
        class="plus-btn"
        onclick="agregarBusqueda()"
      >
        +
      </button>

      <button
        type="button"
        class="delete-btn"
        onclick="borrarFila(this)"
      >
        ×
      </button>
    </td>
  `;

  document
    .getElementById("tbodyBusquedas")
    .appendChild(fila);

  fila.querySelector(".busqueda").focus();
}

function borrarFila(boton) {
  const tbody = document.getElementById(
    "tbodyBusquedas"
  );

  if (tbody.querySelectorAll("tr").length === 1) {
    alert("Debe quedar al menos una fila de búsqueda.");
    return;
  }

  boton.closest("tr").remove();
}

/* =====================================================
   PROCESAR TODAS LAS BÚSQUEDAS
===================================================== */

async function buscarTodas() {
  if (buscando) {
    return;
  }

  if (!mapsListo || !geocoder || !Place) {
    alert(
      "Google Maps no está listo.\n\n" +
      "Revisa la API Key y habilita:\n" +
      "• Maps JavaScript API\n" +
      "• Geocoding API\n" +
      "• Places API (New)"
    );

    return;
  }

  buscando = true;

  const botonBuscar = document.getElementById(
    "btnBuscar"
  );

  botonBuscar.disabled = true;
  botonBuscar.textContent = "Buscando...";

  resultados = [];
  pintarTabla(resultados);

  try {
    const filas = Array.from(
      document.querySelectorAll(
        "#tbodyBusquedas tr"
      )
    );

    for (const fila of filas) {
      const busqueda = fila
        .querySelector(".busqueda")
        .value
        .trim();

      const ciudad = fila
        .querySelector(".ciudad")
        .value
        .trim();

      const departamento = fila
        .querySelector(".departamento")
        .value
        .trim();

      const pais = fila
        .querySelector(".pais")
        .value
        .trim();

      const radioIntroducido = Number(
        fila.querySelector(".radioKm").value
      ) || 3;

      const radioKm = Math.min(
        Math.max(radioIntroducido, 1),
        50
      );

      if (!busqueda || !ciudad || !pais) {
        setEstadoFila(fila, "Pendiente");
        continue;
      }

      try {
        setEstadoFila(fila, "Procesando");

        const cantidadAnterior = resultados.length;

        await buscarPorRadio({
          busqueda,
          ciudad,
          departamento,
          pais,
          radioKm
        });

        if (resultados.length > cantidadAnterior) {
          setEstadoFila(fila, "Procesado");
        } else {
          setEstadoFila(fila, "Sin resultados");
        }

      } catch (error) {
        console.error(
          "Error procesando la fila:",
          error
        );

        setEstadoFila(fila, "Error");

        setEstadoGeneral(
          "Error: " + obtenerMensajeError(error)
        );
      }
    }

    setEstadoGeneral(
      "Resultados: " + resultados.length
    );

  } finally {
    buscando = false;

    botonBuscar.disabled = false;
    botonBuscar.textContent = "Buscar";
  }
}

/* =====================================================
   GEOCODIFICACIÓN
===================================================== */

function geocodificar(direccion) {
  const consulta = geocoder.geocode({
    address: direccion,
    region: "HN"
  }).then(respuesta => {
    if (
      !respuesta.results ||
      !respuesta.results.length
    ) {
      throw new Error(
        "No se encontró la ubicación: " +
        direccion
      );
    }

    return respuesta.results[0]
      .geometry
      .location;
  });

  const limiteTiempo = new Promise(
    (_, reject) => {
      setTimeout(() => {
        reject(
          new Error(
            "Google Maps tardó demasiado " +
            "en ubicar la dirección."
          )
        );
      }, 15000);
    }
  );

  return Promise.race([
    consulta,
    limiteTiempo
  ]);
}

/* =====================================================
   PLACES API (NEW)
===================================================== */

async function buscarPorRadio(parametros) {
  const ubicacionTexto = [
    parametros.ciudad,
    parametros.departamento,
    parametros.pais
  ]
    .filter(Boolean)
    .join(", ");

  setEstadoGeneral(
    "Ubicando: " + ubicacionTexto
  );

  const ubicacion = await geocodificar(
    ubicacionTexto
  );

  const centro = {
    lat: ubicacion.lat(),
    lng: ubicacion.lng()
  };

  const radioMetros =
    parametros.radioKm * 1000;

  setEstadoGeneral(
    "Buscando: " +
    parametros.busqueda +
    " a " +
    parametros.radioKm +
    " KM de " +
    parametros.ciudad
  );

  const solicitud = {
    textQuery:
      parametros.busqueda +
      " en " +
      ubicacionTexto,

    fields: [
      "id",
      "displayName",
      "formattedAddress",
      "nationalPhoneNumber",
      "internationalPhoneNumber",
      "websiteURI",
      "types",
      "location"
    ],

    locationBias: {
      center: centro,
      radius: radioMetros
    },

    language: "es",
    region: "HN",
    maxResultCount: 20
  };

  const respuesta = await Place.searchByText(
    solicitud
  );

  const lugares = respuesta.places || [];

  /*
   locationBias ayuda a Google a priorizar la zona,
   pero no garantiza el radio. Por eso se filtran
   nuevamente las distancias.
  */
  const lugaresDentroDelRadio = lugares.filter(
    lugar => {
      if (!lugar.location) {
        return false;
      }

      const distancia = calcularDistanciaMetros(
        centro.lat,
        centro.lng,
        lugar.location.lat(),
        lugar.location.lng()
      );

      return distancia <= radioMetros;
    }
  );

  lugaresDentroDelRadio.forEach(lugar => {
    const registro = {
      nombre:
        lugar.displayName || "",

      telefono:
        lugar.nationalPhoneNumber ||
        lugar.internationalPhoneNumber ||
        "",

      direccion:
        lugar.formattedAddress || "",

      sitioWeb:
        lugar.websiteURI || "",

      categoria:
        traducirCategoria(
          lugar.types || []
        )
    };

    if (!existeRegistro(registro)) {
      resultados.push(registro);
    }
  });

  pintarTabla(resultados);
}

/* =====================================================
   CALCULAR DISTANCIA REAL
===================================================== */

function calcularDistanciaMetros(
  latitud1,
  longitud1,
  latitud2,
  longitud2
) {
  const radioTierra = 6371000;
  const radianes = Math.PI / 180;

  const diferenciaLatitud =
    (latitud2 - latitud1) * radianes;

  const diferenciaLongitud =
    (longitud2 - longitud1) * radianes;

  const calculo =
    Math.sin(diferenciaLatitud / 2) ** 2 +
    Math.cos(latitud1 * radianes) *
    Math.cos(latitud2 * radianes) *
    Math.sin(diferenciaLongitud / 2) ** 2;

  return radioTierra *
    2 *
    Math.atan2(
      Math.sqrt(calculo),
      Math.sqrt(1 - calculo)
    );
}

/* =====================================================
   VALIDACIÓN DE DUPLICADOS
===================================================== */

function existeRegistro(nuevoRegistro) {
  return resultados.some(registro =>
    (
      nuevoRegistro.nombre &&
      registro.nombre === nuevoRegistro.nombre
    ) ||
    (
      nuevoRegistro.telefono &&
      registro.telefono === nuevoRegistro.telefono
    ) ||
    (
      nuevoRegistro.direccion &&
      registro.direccion === nuevoRegistro.direccion
    )
  );
}

/* =====================================================
   CATEGORÍAS
===================================================== */

function traducirCategoria(tipos) {
  if (!tipos || !tipos.length) {
    return "";
  }

  const categorias = {
    employment_agency: "Agencia de empleo",
    local_government_office: "Oficina gubernamental",
    corporate_office: "Oficina corporativa",
    store: "Tienda",
    restaurant: "Restaurante",
    school: "Escuela",
    university: "Universidad",
    lodging: "Hotel",
    shopping_mall: "Centro comercial",
    point_of_interest: "Punto de interés",
    establishment: "Establecimiento",
    business_center: "Centro de negocios",
    accounting: "Contabilidad",
    lawyer: "Abogado",

  const tipoPrincipal = tipos[0];

  return categorias[tipoPrincipal] ||

}

/* =====================================================
   TABLA DE RESULTADOS
===================================================== */

function pintarTabla(datos) {
  const tbody = document.querySelector(
    "#tabla tbody"
  );

  tbody.innerHTML = "";

  datos.forEach((registro, indice) => {
    const fila = document.createElement("tr");

    const sitioSeguro = escapeAttr(
      registro.sitioWeb
    );

    fila.innerHTML = `
      <td>${indice + 1}</td>

      <td>
        ${escapeHtml(registro.nombre)}
      </td>

      <td>
        ${escapeHtml(registro.telefono)}
      </td>

      <td>
        ${escapeHtml(registro.direccion)}
      </td>

      <td>
        ${
          registro.sitioWeb
            ? `
              <a
                href="${sitioSeguro}"
                target="_blank"
                rel="noopener noreferrer"
              >
                ${escapeHtml(registro.sitioWeb)}
              </a>
            `
            : ""
        }
      </td>

      <td>
        ${escapeHtml(registro.categoria)}
      </td>
    `;

    tbody.appendChild(fila);
  });
}

/* =====================================================
   FILTRAR RESULTADOS
===================================================== */

function filtrarTabla() {
  const texto = document
    .getElementById("filtro")
    .value
    .toLowerCase();

  const filtrados = resultados.filter(
    registro =>
      Object.values(registro).some(
        valor =>
          String(valor || "")
            .toLowerCase()
            .includes(texto)
      )
  );

  pintarTabla(filtrados);
}

/* =====================================================
   EXPORTAR A EXCEL
===================================================== */

function exportarExcel() {
  if (!resultados.length) {
    alert(
      "No hay resultados para exportar."
    );

    return;
  }

  const datosExcel = resultados.map(
    (registro, indice) => ({
      "No": indice + 1,
      "Nombre": registro.nombre,
      "Teléfono": registro.telefono,
      "Dirección": registro.direccion,
      "Sitio web": registro.sitioWeb,
      "Categoría": registro.categoria
    })
  );

  const hoja = XLSX.utils.json_to_sheet(
    datosExcel
  );

  const libro = XLSX.utils.book_new();

  XLSX.utils.book_append_sheet(
    libro,
    hoja,
    "Base"
  );

  XLSX.writeFile(
    libro,
    "Base_Google_Maps.xlsx"
  );
}

/* =====================================================
   LIMPIAR RESULTADOS
===================================================== */

function limpiarResultados() {
  resultados = [];

  pintarTabla([]);

  document.getElementById(
    "filtro"
  ).value = "";

  document
    .querySelectorAll(".estado")
    .forEach(elemento => {
      elemento.value = "Pendiente";
    });

  setEstadoGeneral("Resultados: 0");
}

/* =====================================================
   SALIR
===================================================== */

function salirSistema() {
  if (!confirm("¿Desea salir del sistema?")) {
    return;
  }

  resultados = [];
  pintarTabla([]);

  document.getElementById(
    "filtro"
  ).value = "";

  document
    .querySelectorAll(".busqueda")
    .forEach(elemento => {
      elemento.value = "";
    });

  document
    .querySelectorAll(".radioKm")
    .forEach(elemento => {
      elemento.value = 3;
    });

  document
    .querySelectorAll(".estado")
    .forEach(elemento => {
      elemento.value = "Pendiente";
    });

  cerrarAutomatizaciones();

  document.querySelector(
    ".container"
  ).style.display = "none";

  document.getElementById(
    "pantallaSalida"
  ).style.display = "flex";
}

/* =====================================================
   UTILIDADES
===================================================== */

function obtenerMensajeError(error) {
  return error?.message ||
    String(error || "Error desconocido");
}

function escapeHtml(texto) {
  return String(texto || "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function escapeAttr(texto) {
  return escapeHtml(texto)
    .replaceAll("`", "&#096;");
}

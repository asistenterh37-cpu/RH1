<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ecosistema Automatizado con IA</title>

<style>
:root{
  --azul:#0b1f45;
  --azul2:#163b82;
  --celeste:#32a8ff;
  --verde:#10b981;
  --morado:#7c3aed;
  --gris:#f3f6fb;
  --blanco:#ffffff;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:linear-gradient(135deg,#08142d,#123b7a,#1d4ed8);
  color:#fff;
}

.hero{
  min-height:100vh;
  padding:35px;
  position:relative;
  overflow:hidden;
}

.header{
  text-align:center;
  margin-bottom:25px;
}

.header h1{
  font-size:46px;
  margin:0;
  letter-spacing:.5px;
}

.header p{
  font-size:18px;
  opacity:.9;
}

.ecosistema{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:18px;
  max-width:1300px;
  margin:auto;
  align-items:center;
}

.centro{
  grid-column:2 / 5;
  background:rgba(255,255,255,.12);
  border:1px solid rgba(255,255,255,.25);
  backdrop-filter:blur(14px);
  border-radius:30px;
  padding:45px;
  text-align:center;
  box-shadow:0 25px 70px rgba(0,0,0,.35);
}

.centro h2{
  font-size:42px;
  margin:0 0 15px;
}

.centro p{
  font-size:20px;
  line-height:1.5;
}

.modulo{
  border:none;
  background:linear-gradient(135deg,#22c55e,#2563eb);
  color:#fff;
  padding:16px;
  border-radius:18px;
  font-weight:bold;
  cursor:pointer;
  box-shadow:0 12px 28px rgba(0,0,0,.28);
  transition:.25s;
  min-height:74px;
}

.modulo:hover{
  transform:translateY(-5px) scale(1.03);
  background:linear-gradient(135deg,#7c3aed,#06b6d4);
}

.panel{
  display:none;
  background:var(--blanco);
  color:#111827;
  max-width:1200px;
  margin:35px auto 0;
  border-radius:25px;
  overflow:hidden;
  box-shadow:0 25px 60px rgba(0,0,0,.35);
}

.panel.activo{display:block}

.panel-header{
  background:linear-gradient(135deg,var(--azul),var(--azul2));
  color:#fff;
  padding:28px;
}

.panel-header h2{
  margin:0;
  font-size:32px;
}

.panel-body{
  display:grid;
  grid-template-columns:280px 1fr;
  gap:0;
}

.menu{
  background:#eaf2ff;
  padding:25px;
}

.menu button{
  display:block;
  width:100%;
  margin-bottom:12px;
  padding:14px;
  border:none;
  border-radius:12px;
  background:#1d4ed8;
  color:#fff;
  font-weight:bold;
}

.contenido{
  padding:30px;
}

.contenido h3{
  color:#163b82;
  margin-top:0;
  font-size:25px;
}

.contenido p{
  font-size:18px;
  line-height:1.65;
  text-align:justify;
}

.cerrar{
  float:right;
  background:#ef4444;
  border:none;
  color:white;
  padding:10px 16px;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

.footer{
  text-align:center;
  margin-top:35px;
  opacity:.85;
}

@media(max-width:900px){
  .ecosistema{grid-template-columns:1fr}
  .centro{grid-column:auto}
  .panel-body{grid-template-columns:1fr}
  .header h1{font-size:34px}
}
</style>
</head>

<body>

<section class="hero">
  <div class="header">
    <h1>Ecosistema automatizado con IA</h1>
    <p>Soluciones inteligentes para modernizar la gestión de Recursos Humanos</p>
  </div>

  <div class="ecosistema" id="botones"></div>

  <div id="panel" class="panel">
    <div class="panel-header">
      <button class="cerrar" onclick="cerrarPanel()">Cerrar</button>
      <h2 id="tituloModulo"></h2>
    </div>
    <div class="panel-body">
      <div class="menu" id="menuModulo"></div>
      <div class="contenido">
        <h3>Descripción del módulo</h3>
        <p id="descripcionModulo"></p>
      </div>
    </div>
  </div>

  <div class="footer">
    Portafolio de automatizaciones RH impulsadas por inteligencia artificial
  </div>
</section>

<script>
const modulos = [
{
 nombre:"Descripción de puestos",
 menu:["Formulario","Tabulación","Generar descripción con IA","Exportar Word","Base de puestos"],
 descripcion:"Este módulo permite recopilar y documentar de manera estructurada la información necesaria para elaborar descripciones de puesto dentro de la organización. Facilita el registro de datos generales del cargo, relaciones jerárquicas, funciones principales y reportes generados por cada posición. Además, incorpora herramientas para tabular la información recopilada, generar descripciones de puesto mediante inteligencia artificial y exportar los resultados a formato Word."
},
{
 nombre:"Reclutamiento",
 menu:["Requisición de Personal","Aprobaciones","Anunciar","Postulación","Candidatos","Solicitud de empleo","Políticas"],
 descripcion:"Este módulo automatiza y centraliza el proceso de reclutamiento y selección de personal, desde la requisición de vacantes hasta la gestión de candidatos. Permite administrar aprobaciones, publicar plazas, recibir postulaciones y registrar solicitudes de empleo en una sola plataforma. Además, incorpora herramientas de inteligencia artificial para generar anuncios de empleo y analizar candidatos según el perfil requerido."
},
{
 nombre:"Marco normativo",
 menu:["Ética","Confidencialidad","Reglamento Interno","Test"],
 descripcion:"Este módulo centraliza y comunica el marco normativo de la organización, poniendo a disposición de los colaboradores el Código de Ética, el Acuerdo de Confidencialidad y el Reglamento Interno. Facilita la consulta de políticas, normas de conducta, derechos, obligaciones y procedimientos institucionales en un entorno digital accesible."
},
{
 nombre:"Evaluación del desempeño",
 menu:["Inicio","Niveles","Formularios","Pesos","Autoevaluación","Evaluación clientes","Evaluación desempeño","KPIs / entregables","Incidencias","One to One","Calibración","Reportes"],
 descripcion:"SíPodés es una plataforma integral de gestión y evaluación del desempeño que centraliza todo el ciclo de medición, seguimiento y desarrollo del talento humano. Permite administrar niveles, formularios, autoevaluaciones, evaluaciones de clientes, desempeño, KPIs, incidencias, sesiones One to One y procesos de calibración."
},
{
 nombre:"Mapeo del talento",
 menu:["Mapeo del talento","Formulario","Potencial","Cuadrante de talento","Resultados"],
 descripcion:"Este módulo permite evaluar y clasificar el talento de los colaboradores mediante la medición de dos variables clave: rendimiento y potencial. Consolida resultados y ubica automáticamente a cada persona en una matriz de talento para apoyar decisiones de sucesión, desarrollo, capacitación y gestión del capital humano."
},
{
 nombre:"Administración de la compensación",
 menu:["Presentación","Objetivos","Organigrama","Valuación","Equidad interna","Competitividad externa","Estructura salarial","Puestos por grado","Compa Ratios","Sueldos de contratación","Referencias","Aplicación"],
 descripcion:"Este módulo proporciona una solución integral para la administración salarial, permitiendo analizar, diseñar y gestionar estructuras de compensación de manera técnica y objetiva. Integra valuación de puestos, organigramas, equidad interna, competitividad externa, estructuras salariales, compa ratios y políticas salariales."
},
{
 nombre:"Clima laboral",
 menu:["Encuesta","Segmentación","Tabulación","Dashboard","Análisis IA","Recomendaciones"],
 descripcion:"Este módulo permite medir y analizar el clima laboral mediante encuestas estructuradas aplicadas a los colaboradores. Facilita la captura de respuestas, segmentación, tabulación automática, dashboards interactivos y recomendaciones generadas con inteligencia artificial."
},
{
 nombre:"Expedientes de personal",
 menu:["Datos generales","Configuración laboral","Capacitación","Acciones de personal","Ausencias","Vacaciones","Medidas disciplinarias","Documentos"],
 descripcion:"Este módulo permite administrar de forma integral el expediente digital del colaborador, centralizando información personal, académica, laboral y de desarrollo profesional en una sola plataforma. Mantiene un historial completo y actualizado de cada empleado."
},
{
 nombre:"Compensación variable",
 menu:["Procedimiento","Tablas","Planilla","Cobertura","Porcentaje","Cumplimientos","Aplica"],
 descripcion:"Este módulo automatiza el cálculo de bonos a partir de la información registrada en Google Sheets, cruzando datos de planilla, cobertura, tablas de factores, porcentajes y cumplimientos. Calcula puntajes, porcentajes, montos por frecuencia y bono anual."
},
{
 nombre:"Control de asistencia",
 menu:["Ingreso PIN","Marcar entrada","Marcar salida","Validación GPS","Historial","Limpieza de registros"],
 descripcion:"Este módulo administra el registro de asistencia mediante una aplicación web conectada a Google Sheets. Permite registrar entradas y salidas desde dispositivos móviles, validando ubicación GPS, fecha, hora, dispositivo y estado del registro."
},
{
 nombre:"Plan de retiro",
 menu:["Datos del colaborador","Proyección","Simulación financiera","Gráficos","Comparativo","Fundamento legal"],
 descripcion:"Este módulo permite calcular y proyectar el costo futuro de las prestaciones laborales con base en salario, antigüedad, edad y crecimiento salarial esperado. Incluye simulaciones financieras, gráficos comparativos y análisis de prefondeo."
},
{
 nombre:"Prospección",
 menu:["Búsqueda","Ciudad","Departamento","País","Radio KM","Resultados","Exportar a Excel","Filtrar resultados"],
 descripcion:"Este módulo permite realizar búsquedas automatizadas de empresas o establecimientos en Google Maps mediante palabra clave, ciudad, departamento, país y radio. Recupera nombre, teléfono, dirección, sitio web y categoría, evitando duplicados."
},
{
 nombre:"Planificación estratégica",
 menu:["Formulario","Generar diagnóstico","Generar estrategia","Diseñar visión, misión y valores","Descargar Word","Mis automatizaciones"],
 descripcion:"Este módulo permite recopilar información estratégica de una empresa para elaborar un plan ejecutivo completo. Mediante inteligencia artificial genera diagnóstico, estrategias, misión, visión y valores organizacionales, con exportación a Word."
},
{
 nombre:"Automatización de procesos con IA",
 menu:["Análisis de información","Generación de documentos","Reportes automáticos","Clasificación de datos","Flujos de trabajo","Recomendaciones IA"],
 descripcion:"Automatiza procesos administrativos mediante inteligencia artificial para reducir tareas manuales, mejorar la eficiencia y agilizar la toma de decisiones. Integra procesos, disminuye errores, optimiza tiempos y aumenta la productividad."
}
];

const contenedor = document.getElementById("botones");

modulos.forEach((m, i)=>{
  if(i===4){
    const centro = document.createElement("div");
    centro.className = "centro";
    centro.innerHTML = `
      <h2>Ecosistema automatizado con IA</h2>
      <p>Una suite ejecutiva de soluciones digitales para transformar Recursos Humanos: más control, más velocidad y decisiones con datos. El Excel ya no llora solo.</p>
    `;
    contenedor.appendChild(centro);
  }

  const btn = document.createElement("button");
  btn.className = "modulo";
  btn.textContent = m.nombre;
  btn.onclick = () => mostrarModulo(m);
  contenedor.appendChild(btn);
});

function mostrarModulo(modulo){
  document.getElementById("panel").classList.add("activo");
  document.getElementById("tituloModulo").textContent = modulo.nombre;
  document.getElementById("descripcionModulo").textContent = modulo.descripcion;

  const menu = document.getElementById("menuModulo");
  menu.innerHTML = "";
  modulo.menu.forEach(item=>{
    const b = document.createElement("button");
    b.textContent = item;
    menu.appendChild(b);
  });

  document.getElementById("panel").scrollIntoView({behavior:"smooth"});
}

function cerrarPanel(){
  document.getElementById("panel").classList.remove("activo");
}
</script>

</body>
</html>

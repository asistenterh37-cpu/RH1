<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ecosistema Automatizado con IA</title>

<style>
:root{
  --bg1:#07111f;
  --bg2:#0f2f68;
  --glass:rgba(255,255,255,.14);
  --glass2:rgba(255,255,255,.22);
  --stroke:rgba(255,255,255,.28);
  --text:#ffffff;
  --muted:#dbeafe;
  --blue:#2563eb;
  --cyan:#06b6d4;
  --green:#10b981;
  --purple:#7c3aed;
  --red:#ef4444;
}

*{box-sizing:border-box}

html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:"Segoe UI", Arial, sans-serif;
  color:var(--text);
  background:
    radial-gradient(circle at top left,rgba(124,58,237,.45),transparent 32%),
    radial-gradient(circle at bottom right,rgba(6,182,212,.35),transparent 30%),
    linear-gradient(135deg,var(--bg1),var(--bg2),#111827);
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  background-image:
    linear-gradient(rgba(255,255,255,.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.04) 1px,transparent 1px);
  background-size:42px 42px;
  opacity:.45;
  pointer-events:none;
}

.hero{
  height:100vh;
  padding:18px 26px;
  display:flex;
  flex-direction:column;
  position:relative;
}

.topbar{
  height:74px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:16px;
  padding:10px 14px;
  border:1px solid var(--stroke);
  background:rgba(255,255,255,.10);
  backdrop-filter:blur(24px);
  border-radius:24px;
  box-shadow:0 20px 55px rgba(0,0,0,.25);
  z-index:20;
}

.brand{
  display:flex;
  align-items:center;
  gap:12px;
  min-width:180px;
}

.logo{
  width:44px;
  height:44px;
  border-radius:16px;
  background:linear-gradient(135deg,var(--cyan),var(--purple));
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:24px;
  box-shadow:0 12px 28px rgba(0,0,0,.35);
}

.brand span{
  font-size:14px;
  color:var(--muted);
  line-height:1.2;
}

.header{
  text-align:center;
  flex:1;
}

.header h1{
  margin:0;
  font-size:35px;
  letter-spacing:.4px;
}

.header p{
  margin:4px 0 0;
  font-size:15px;
  color:var(--muted);
}

.acciones{
  display:flex;
  gap:10px;
  justify-content:flex-end;
  min-width:260px;
}

.btn-top{
  border:none;
  color:white;
  padding:12px 17px;
  border-radius:16px;
  font-size:16px;
  font-weight:800;
  cursor:pointer;
  background:rgba(255,255,255,.14);
  border:1px solid rgba(255,255,255,.22);
  backdrop-filter:blur(18px);
  box-shadow:0 10px 28px rgba(0,0,0,.25);
  transition:.25s;
}

.btn-top:hover{
  transform:translateY(-2px);
  background:rgba(255,255,255,.22);
}

.btn-rompecabezas{
  background:linear-gradient(135deg,rgba(124,58,237,.92),rgba(37,99,235,.92));
}

.btn-volver{
  background:linear-gradient(135deg,rgba(15,23,42,.8),rgba(51,65,85,.8));
}

.ecosistema{
  flex:1;
  margin-top:15px;
  display:grid;
  grid-template-columns:repeat(5,1fr);
  grid-template-rows:repeat(4,1fr);
  gap:13px;
  min-height:0;
}

.modulo{
  border:1px solid rgba(255,255,255,.25);
  color:white;
  padding:18px;
  border-radius:22px;
  font-size:24px;          /* Antes 17px */
  line-height:1.25;
  font-weight:900;
  letter-spacing:.3px;
  cursor:pointer;
  background:
    linear-gradient(135deg,rgba(255,255,255,.18),rgba(255,255,255,.08)),
    linear-gradient(135deg,rgba(37,99,235,.75),rgba(16,185,129,.65));
  backdrop-filter:blur(22px);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.25),
    0 18px 40px rgba(0,0,0,.26);
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  min-height:95px;
  transition:.25s;
}
  border:1px solid rgba(255,255,255,.25);
  color:white;
  padding:12px;
  border-radius:22px;
  font-size:17px;
  line-height:1.18;
  font-weight:800;
  cursor:pointer;
  background:
    linear-gradient(135deg,rgba(255,255,255,.18),rgba(255,255,255,.08)),
    linear-gradient(135deg,rgba(37,99,235,.75),rgba(16,185,129,.65));
  backdrop-filter:blur(22px);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.25),
    0 18px 40px rgba(0,0,0,.26);
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  min-height:68px;
  transition:.25s;
}

.modulo:hover{
  transform:translateY(-5px) scale(1.015);
  background:
    linear-gradient(135deg,rgba(255,255,255,.25),rgba(255,255,255,.10)),
    linear-gradient(135deg,rgba(124,58,237,.86),rgba(6,182,212,.78));
}

.centro{
  grid-column:2 / 5;
  grid-row:2 / 4;
  border:1px solid rgba(255,255,255,.32);
  background:rgba(255,255,255,.16);
  backdrop-filter:blur(30px);
  border-radius:34px;
  padding:30px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  text-align:center;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.35),
    0 30px 80px rgba(0,0,0,.35);
}

.centro .badge{
  width:max-content;
  margin:0 auto 12px;
  padding:9px 16px;
  border-radius:999px;
  background:rgba(255,255,255,.16);
  border:1px solid rgba(255,255,255,.24);
  color:#dbeafe;
  font-weight:800;
  font-size:14px;
}

.centro h2{
  margin:0 0 12px;
  font-size:42px;
  line-height:1.05;
}

.centro p{
  margin:0 auto;
  max-width:760px;
  font-size:18px;
  line-height:1.45;
  color:#e0f2fe;
}

.panel{
  display:none;
  position:fixed;
  inset:105px 26px 24px 26px;
  color:#0f172a;
  border-radius:30px;
  overflow:hidden;
  z-index:60;
  background:rgba(255,255,255,.78);
  backdrop-filter:blur(34px);
  border:1px solid rgba(255,255,255,.55);
  box-shadow:0 35px 90px rgba(0,0,0,.45);
}

.panel.activo{
  display:grid;
  grid-template-rows:76px 1fr;
}

.panel-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  padding:18px 24px;
  background:linear-gradient(135deg,rgba(7,17,31,.92),rgba(37,99,235,.84));
  color:white;
}

.panel-header h2{
  margin:0;
  font-size:28px;
}

.cerrar{
  background:rgba(239,68,68,.9);
  border:none;
  color:white;
  padding:10px 16px;
  border-radius:14px;
  cursor:pointer;
  font-weight:800;
  font-size:15px;
}

.panel-body{
  min-height:0;
  display:grid;
  grid-template-columns:300px 1fr;
}

.menu{
  min-height:0;
  overflow:auto;
  padding:18px;
  background:rgba(219,234,254,.65);
  border-right:1px solid rgba(148,163,184,.45);
}

.menu button{
  display:block;
  width:100%;
  margin-bottom:10px;
  padding:13px 14px;
  border:none;
  border-radius:16px;
  background:linear-gradient(135deg,#2563eb,#0ea5e9);
  color:white;
  font-size:17px;
  font-weight:800;
  cursor:pointer;
  text-align:left;
  box-shadow:0 8px 20px rgba(37,99,235,.25);
}

.contenido{
  min-height:0;
  padding:20px;
  overflow:hidden;
}

.descripcion-card{
  height:100%;
  overflow:auto;
  padding:24px;
  border-radius:24px;
  background:rgba(255,255,255,.82);
  border:1px solid rgba(148,163,184,.35);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.85);
}

.descripcion-card h3{
  margin:0 0 14px;
  color:#1d4ed8;
  font-size:25px;
}

.descripcion-card p{
  margin:0;
  font-size:19px;
  line-height:1.62;
  text-align:justify;
  color:#1f2937;
}

.footer{
  height:24px;
  text-align:center;
  font-size:12px;
  color:#dbeafe;
  opacity:.9;
  padding-top:6px;
}

.puzzle-menu{
  display:none;
  position:fixed;
  top:96px;
  right:36px;
  z-index:200;
  padding:12px;
  border-radius:20px;
  background:rgba(255,255,255,.85);
  backdrop-filter:blur(24px);
  border:1px solid rgba(255,255,255,.55);
  box-shadow:0 25px 60px rgba(0,0,0,.35);
}

.puzzle-menu button{
  display:block;
  width:180px;
  margin:8px 0;
  padding:13px;
  border:none;
  border-radius:14px;
  background:linear-gradient(135deg,#2563eb,#7c3aed);
  color:white;
  font-size:17px;
  font-weight:800;
  cursor:pointer;
}

.puzzle-modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(2,6,23,.68);
  z-index:300;
  justify-content:center;
  align-items:center;
}

.puzzle-card{
  width:min(90vw,540px);
  padding:24px;
  text-align:center;
  border-radius:28px;
  background:rgba(255,255,255,.88);
  backdrop-filter:blur(28px);
  color:#111827;
  border:1px solid rgba(255,255,255,.65);
  box-shadow:0 35px 90px rgba(0,0,0,.5);
}

.cerrar-puzzle{
  float:right;
  background:#ef4444;
  color:white;
  border:none;
  padding:9px 14px;
  border-radius:12px;
  cursor:pointer;
  font-weight:800;
}

.puzzle-board{
  margin:18px auto 0;
  display:grid;
  gap:7px;
  width:min(72vw,390px);
  height:min(72vw,390px);
}

.tile{
  border-radius:14px;
  background:linear-gradient(135deg,#2563eb,#10b981);
  color:white;
  font-size:25px;
  font-weight:900;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  user-select:none;
  box-shadow:0 9px 18px rgba(0,0,0,.22);
}

.tile.empty{
  background:#e5e7eb;
  box-shadow:inset 0 2px 8px rgba(0,0,0,.12);
  cursor:default;
}

@media(max-width:1050px){
  html,body{overflow:auto}
  .hero{height:auto;min-height:100vh}
  .topbar{height:auto;flex-direction:column}
  .brand,.acciones{min-width:0}
  .ecosistema{grid-template-columns:repeat(2,1fr);grid-template-rows:auto}
  .centro{grid-column:1 / 3;grid-row:auto}
  .panel{inset:92px 12px 15px 12px}
  .panel-body{grid-template-columns:1fr}
  .menu{max-height:170px}
}

@media(max-width:650px){
  .hero{padding:12px}
  .ecosistema{grid-template-columns:1fr}
  .centro{grid-column:auto}
  .header h1{font-size:27px}
  .centro h2{font-size:31px}
  .acciones{flex-wrap:wrap;justify-content:center}
}
</style>
</head>

<body>

<section class="hero">

  <div class="topbar">
    <div class="brand">
      <div class="logo">AI</div>
      <span>Soluciones automatizadas<br>de Recursos Humanos</span>
    </div>

    <div class="header">
      <h1>Ecosistema automatizado con IA</h1>
      <p>Suite ejecutiva para transformar la gestión del talento humano</p>
    </div>

    <div class="acciones">
      <button class="btn-top btn-volver" onclick="cerrarPanel()">⬅ Volver</button>
      <button class="btn-top btn-rompecabezas" onclick="togglePuzzleMenu()">🧩 Rompecabezas</button>
    </div>
  </div>

  <div class="puzzle-menu" id="puzzleMenu">
    <button onclick="abrirPuzzle(3)">Nivel 3x3</button>
    <button onclick="abrirPuzzle(4)">Nivel 4x4</button>
    <button onclick="abrirPuzzle(5)">Nivel 5x5</button>
  </div>

  <div class="puzzle-modal" id="puzzleModal">
    <div class="puzzle-card">
      <button class="cerrar-puzzle" onclick="cerrarPuzzle()">Cerrar</button>
      <h2>Rompecabezas deslizante</h2>
      <p id="nivelTexto"></p>
      <div id="puzzleBoard" class="puzzle-board"></div>
    </div>
  </div>

  <div class="ecosistema" id="botones"></div>

  <div id="panel" class="panel">
    <div class="panel-header">
      <h2 id="tituloModulo"></h2>
      <button class="cerrar" onclick="cerrarPanel()">Cerrar</button>
    </div>

    <div class="panel-body">
      <div class="menu" id="menuModulo"></div>

      <div class="contenido">
        <div class="descripcion-card">
          <h3>Descripción del módulo</h3>
          <p id="descripcionModulo"></p>
        </div>
      </div>
    </div>
  </div>

  <div class="footer">
    Portafolio de automatizaciones RH impulsadas por inteligencia artificial
  </div>

</section>

<script>
const modulos = [
  moduloDescripcionPuestos,
  moduloReclutamiento,
  moduloMarcoNormativo,
  moduloExpedientesPersonal,
  moduloControlAsistencia,
  moduloEvaluacionDesempeno,
  moduloMapeoTalento,
  moduloClimaLaboral,
  moduloCompensacionVariable,
  moduloAdministracionCompensacion,
  moduloPlanRetiro,
  moduloPlanificacionEstrategica,
  moduloProspeccion,
  moduloAutomatizacionIA
];
const contenedor = document.getElementById("botones");

modulos.forEach((m, i)=>{
  if(i === 4){
    const centro = document.createElement("div");
    centro.className = "centro";
    centro.innerHTML = `
      <div class="badge">IA aplicada a Recursos Humanos</div>
      <h2>Ecosistema automatizado con IA</h2>
      <p>Una suite ejecutiva de soluciones digitales para transformar Recursos Humanos: más control, más velocidad, trazabilidad y decisiones basadas en datos.</p>
    `;
    contenedor.appendChild(centro);
  }

  const btn = document.createElement("button");
  btn.className = "modulo";
  btn.textContent = m.nombre;
  btn.onclick = () => mostrarModulo(m);
  contenedor.appendChild(btn);
});

function mostrarModulo(modulo){
  document.getElementById("panel").classList.add("activo");
  document.getElementById("tituloModulo").textContent = modulo.nombre;
  document.getElementById("descripcionModulo").textContent = modulo.descripcion;

  const menu = document.getElementById("menuModulo");
  menu.innerHTML = "";

  modulo.menu.forEach(item=>{
    const b = document.createElement("button");
    b.textContent = item;
    menu.appendChild(b);
  });
}

function cerrarPanel(){
  document.getElementById("panel").classList.remove("activo");
}

let puzzleSize = 3;
let tiles = [];

function togglePuzzleMenu(){
  const menu = document.getElementById("puzzleMenu");
  menu.style.display = menu.style.display === "block" ? "none" : "block";
}

function abrirPuzzle(size){
  puzzleSize = size;
  document.getElementById("puzzleMenu").style.display = "none";
  document.getElementById("puzzleModal").style.display = "flex";
  document.getElementById("nivelTexto").textContent = `Nivel ${size}x${size}`;
  crearPuzzle(size);
}

function cerrarPuzzle(){
  document.getElementById("puzzleModal").style.display = "none";
}

function crearPuzzle(size){
  const total = size * size;
  tiles = [];

  for(let i = 1; i < total; i++){
    tiles.push(i);
  }

  tiles.push("");

  do{
    tiles = tiles.sort(() => Math.random() - 0.5);
  }while(!esResoluble(tiles, size));

  dibujarPuzzle();
}

function dibujarPuzzle(){
  const board = document.getElementById("puzzleBoard");
  board.innerHTML = "";
  board.style.gridTemplateColumns = `repeat(${puzzleSize}, 1fr)`;
  board.style.gridTemplateRows = `repeat(${puzzleSize}, 1fr)`;

  tiles.forEach((tile, index)=>{
    const div = document.createElement("div");
    div.className = tile === "" ? "tile empty" : "tile";
    div.textContent = tile;
    div.onclick = () => moverTile(index);
    board.appendChild(div);
  });
}

function moverTile(index){
  const emptyIndex = tiles.indexOf("");
  const fila = Math.floor(index / puzzleSize);
  const col = index % puzzleSize;
  const emptyFila = Math.floor(emptyIndex / puzzleSize);
  const emptyCol = emptyIndex % puzzleSize;

  const esVecino = Math.abs(fila - emptyFila) + Math.abs(col - emptyCol) === 1;

  if(esVecino){
    [tiles[index], tiles[emptyIndex]] = [tiles[emptyIndex], tiles[index]];
    dibujarPuzzle();

    if(ganaste()){
      setTimeout(()=>alert("¡Ganaste! RH desbloqueado nivel ninja 🧩"),200);
    }
  }
}

function ganaste(){
  const correcto = [];

  for(let i = 1; i < puzzleSize * puzzleSize; i++){
    correcto.push(i);
  }

  correcto.push("");
  return tiles.every((v,i)=>v === correcto[i]);
}

function esResoluble(array, size){
  const nums = array.filter(n => n !== "");
  let inversiones = 0;

  for(let i = 0; i < nums.length; i++){
    for(let j = i + 1; j < nums.length; j++){
      if(nums[i] > nums[j]) inversiones++;
    }
  }

  if(size % 2 === 1){
    return inversiones % 2 === 0;
  }else{
    const emptyRowFromBottom = size - Math.floor(array.indexOf("") / size);
    return (emptyRowFromBottom % 2 === 0) !== (inversiones % 2 === 0);
  }
}
</script>

</body>
</html>

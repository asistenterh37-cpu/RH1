<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ecosistema Automatizado con IA</title>

<style>
:root{
  --azul:#071b3a;
  --azul2:#123f8c;
  --verde:#10b981;
  --morado:#7c3aed;
  --blanco:#ffffff;
}

*{box-sizing:border-box}

html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:Arial, Helvetica, sans-serif;
  background:linear-gradient(135deg,#07142f,#123f8c,#1d4ed8);
  color:white;
}

.hero{
  height:100vh;
  padding:18px 28px;
  display:flex;
  flex-direction:column;
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:15px;
  margin-bottom:12px;
}

.header{
  text-align:center;
  flex:1;
}

.header h1{
  font-size:36px;
  margin:0;
}

.header p{
  font-size:15px;
  margin:5px 0 0;
  opacity:.9;
}

.acciones{
  display:flex;
  gap:10px;
}

.btn-top{
  border:none;
  color:white;
  padding:12px 18px;
  border-radius:13px;
  font-size:17px;
  font-weight:bold;
  cursor:pointer;
  box-shadow:0 8px 20px rgba(0,0,0,.3);
}

.btn-volver{
  background:#334155;
}

.btn-rompecabezas{
  background:linear-gradient(135deg,#7c3aed,#2563eb);
}

.ecosistema{
  flex:1;
  display:grid;
  grid-template-columns:repeat(5,1fr);
  grid-auto-rows:1fr;
  gap:12px;
  max-width:1400px;
  width:100%;
  margin:auto;
  align-items:stretch;
}

.centro{
  grid-column:2 / 5;
  grid-row:2 / 4;
  background:rgba(255,255,255,.13);
  border:1px solid rgba(255,255,255,.25);
  backdrop-filter:blur(12px);
  border-radius:26px;
  padding:28px;
  text-align:center;
  display:flex;
  flex-direction:column;
  justify-content:center;
  box-shadow:0 18px 45px rgba(0,0,0,.35);
}

.centro h2{
  font-size:34px;
  margin:0 0 12px;
}

.centro p{
  font-size:18px;
  line-height:1.45;
  margin:0;
}

.modulo{
  border:none;
  background:linear-gradient(135deg,#22c55e,#2563eb);
  color:white;
  padding:12px;
  border-radius:16px;
  font-size:18px;
  line-height:1.2;
  font-weight:bold;
  cursor:pointer;
  box-shadow:0 10px 22px rgba(0,0,0,.28);
  transition:.25s;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  min-height:70px;
}

.modulo:hover{
  transform:translateY(-4px);
  background:linear-gradient(135deg,#7c3aed,#06b6d4);
}

.panel{
  display:none;
  position:fixed;
  inset:92px 28px 25px 28px;
  background:white;
  color:#111827;
  border-radius:22px;
  overflow:hidden;
  box-shadow:0 25px 70px rgba(0,0,0,.45);
  z-index:50;
}

.panel.activo{
  display:grid;
  grid-template-rows:auto 1fr;
}

.panel-header{
  background:linear-gradient(135deg,#071b3a,#123f8c);
  color:white;
  padding:18px 24px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.panel-header h2{
  margin:0;
  font-size:28px;
}

.cerrar{
  background:#ef4444;
  border:none;
  color:white;
  padding:10px 16px;
  border-radius:10px;
  cursor:pointer;
  font-size:16px;
  font-weight:bold;
}

.panel-body{
  min-height:0;
  display:grid;
  grid-template-columns:300px 1fr;
}

.menu{
  background:#eaf2ff;
  padding:18px;
  overflow:auto;
}

.menu button{
  display:block;
  width:100%;
  margin-bottom:10px;
  padding:14px;
  border:none;
  border-radius:12px;
  background:#1d4ed8;
  color:white;
  font-weight:bold;
  font-size:18px;
  cursor:pointer;
}

.contenido{
  padding:22px;
  min-height:0;
  overflow:hidden;
}

.descripcion-card{
  height:100%;
  border:1px solid #dbe4f0;
  border-radius:18px;
  padding:22px;
  background:#f8fafc;
  overflow:auto;
}

.descripcion-card h3{
  color:#123f8c;
  margin:0 0 14px;
  font-size:25px;
}

.descripcion-card p{
  color:#1f2937;
  font-size:19px;
  line-height:1.6;
  text-align:justify;
  margin:0;
}

.footer{
  text-align:center;
  font-size:13px;
  opacity:.85;
  padding-top:8px;
}

.puzzle-menu{
  display:none;
  position:fixed;
  top:72px;
  right:28px;
  z-index:200;
  background:white;
  padding:12px;
  border-radius:14px;
  box-shadow:0 15px 35px rgba(0,0,0,.35);
}

.puzzle-menu button{
  display:block;
  width:170px;
  margin:8px 0;
  padding:13px;
  border:none;
  border-radius:10px;
  background:#1d4ed8;
  color:white;
  font-size:17px;
  font-weight:bold;
  cursor:pointer;
}

.puzzle-modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.65);
  z-index:300;
  justify-content:center;
  align-items:center;
}

.puzzle-card{
  background:white;
  color:#111827;
  padding:22px;
  border-radius:22px;
  width:min(90vw,540px);
  text-align:center;
  box-shadow:0 25px 70px rgba(0,0,0,.45);
}

.cerrar-puzzle{
  float:right;
  background:#ef4444;
  color:white;
  border:none;
  padding:9px 14px;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

.puzzle-board{
  margin:18px auto 0;
  display:grid;
  gap:6px;
  width:min(72vw,390px);
  height:min(72vw,390px);
}

.tile{
  background:linear-gradient(135deg,#2563eb,#10b981);
  color:white;
  font-size:25px;
  font-weight:bold;
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  user-select:none;
}

.tile.empty{
  background:#e5e7eb;
  cursor:default;
}

@media(max-width:1000px){
  html,body{overflow:auto}
  .hero{height:auto;min-height:100vh}
  .topbar{flex-direction:column}
  .acciones{width:100%;justify-content:center}
  .ecosistema{grid-template-columns:1fr 1fr}
  .centro{grid-column:1 / 3;grid-row:auto}
  .panel{
    position:fixed;
    inset:85px 12px 15px 12px;
  }
  .panel-body{grid-template-columns:1fr}
  .menu{max-height:180px}
}

@media(max-width:650px){
  .ecosistema{grid-template-columns:1fr}
  .centro{grid-column:auto}
  .header h1{font-size:28px}
  .btn-top{font-size:15px;padding:10px 13px}
}
</style>
</head>

<body>

<section class="hero">

  <div class="topbar">
    <button class="btn-top btn-volver" onclick="cerrarPanel()">⬅ Volver</button>

    <div class="header">
      <h1>Ecosistema automatizado con IA</h1>
      <p>Soluciones inteligentes para modernizar la gestión de Recursos Humanos</p>
    </div>

    <div class="acciones">
      <button class="btn-top btn-rompecabezas" onclick="togglePuzzleMenu()">🧩 Rompecabezas</button>
    </div>
  </div>

  <div class="puzzle-menu" id="puzzleMenu">
    <button onclick="abrirPuzzle(3)">Nivel 3x3</button>
    <button onclick="abrirPuzzle(4)">Nivel 4x4</button>
    <button onclick="abrirPuzzle(5)">Nivel 5x5</button>
  </div>

  <div class="puzzle-modal" id="puzzleModal">
    <div class="puzzle-card">
      <button class="cerrar-puzzle" onclick="cerrarPuzzle()">Cerrar</button>
      <h2>Rompecabezas deslizante</h2>
      <p id="nivelTexto"></p>
      <div id="puzzleBoard" class="puzzle-board"></div>
    </div>
  </div>

  <div class="ecosistema" id="botones"></div>

  <div id="panel" class="panel">
    <div class="panel-header">
      <h2 id="tituloModulo"></h2>
      <button class="cerrar" onclick="cerrarPanel()">Cerrar</button>
    </div>

    <div class="panel-body">
      <div class="menu" id="menuModulo"></div>

      <div class="contenido">
        <div class="descripcion-card">
          <h3>Descripción del módulo</h3>
          <p id="descripcionModulo"></p>
        </div>
      </div>
    </div>
  </div>

  <div class="footer">
    Portafolio de automatizaciones RH impulsadas por inteligencia artificial
  </div>

</section>

<script>
const modulos = [
{
 nombre:"Descripción de puestos",
 menu:["Formulario","Tabulación","Generar descripción con IA","Exportar Word","Base de puestos"],
 descripcion:"Este módulo permite recopilar y documentar de manera estructurada la información necesaria para elaborar descripciones de puesto dentro de la organización. Facilita el registro de datos generales del cargo, relaciones jerárquicas, funciones principales y reportes generados por cada posición. Además, incorpora herramientas para tabular la información recopilada, generar descripciones de puesto mediante inteligencia artificial y exportar los resultados a formato Word. Su integración con Google Sheets permite almacenar la información de forma centralizada, asegurando trazabilidad, consistencia y facilidad de consulta para los procesos de Recursos Humanos."
},
{
 nombre:"Reclutamiento",
 menu:["Requisición de Personal","Aprobaciones","Anunciar","Postulación","Candidatos","Solicitud de empleo","Políticas"],
 descripcion:"Este módulo automatiza y centraliza el proceso de reclutamiento y selección de personal, desde la requisición de vacantes hasta la gestión de candidatos. Permite administrar aprobaciones, publicar plazas, recibir postulaciones y registrar solicitudes de empleo en una sola plataforma. Además, incorpora herramientas de inteligencia artificial para generar anuncios de empleo y analizar candidatos según el perfil requerido. Su objetivo es agilizar la contratación, mejorar la toma de decisiones y garantizar un proceso de selección más eficiente y estructurado."
},
{
 nombre:"Marco normativo",
 menu:["Ética","Confidencialidad","Reglamento Interno","Test"],
 descripcion:"Este módulo centraliza y comunica el marco normativo de la organización, poniendo a disposición de los colaboradores el Código de Ética, el Acuerdo de Confidencialidad y el Reglamento Interno. Facilita la consulta de políticas, normas de conducta, derechos, obligaciones y procedimientos institucionales en un entorno digital accesible. Además, incorpora un apartado de evaluación o test para registrar la comprensión y aceptación de estos lineamientos."
},
{
 nombre:"Evaluación del desempeño",
 menu:["Inicio","Niveles","Formularios","Pesos","Autoevaluación","Evaluación clientes","Evaluación desempeño","KPIs / entregables","Incidencias","One to One","Calibración","Reportes"],
 descripcion:"SíPodés es una plataforma integral de gestión y evaluación del desempeño que centraliza todo el ciclo de medición, seguimiento y desarrollo del talento humano. Permite administrar niveles de puestos, formularios de evaluación, autoevaluaciones, evaluaciones de clientes, desempeño, KPIs, incidencias, sesiones One to One y procesos de calibración en una sola herramienta. Además, genera reportes ejecutivos, análisis de resultados y necesidades de capacitación para apoyar la toma de decisiones."
},
{
 nombre:"Mapeo del talento",
 menu:["Mapeo del talento","Formulario","Potencial","Cuadrante de talento","Resultados"],
 descripcion:"Este módulo permite evaluar y clasificar el talento de los colaboradores mediante la medición de dos variables clave: rendimiento y potencial. Incluye formularios de evaluación estructurados, consolida los resultados y ubica automáticamente a cada persona en una matriz o cuadrante de talento para facilitar la identificación de colaboradores de alto desempeño, alto potencial y oportunidades de desarrollo."
},
{
 nombre:"Administración de la compensación",
 menu:["Presentación","Objetivos","Organigrama","Valuación","Equidad interna","Competitividad externa","Estructura salarial","Puestos por grado","Compa Ratios","Sueldos de contratación","Referencias","Aplicación"],
 descripcion:"Este módulo proporciona una solución integral para la administración salarial, permitiendo analizar, diseñar y gestionar estructuras de compensación de manera técnica y objetiva. Integra herramientas para valuación de puestos, organigramas, equidad interna, competitividad externa, estructuras salariales, compa ratios, sueldos de contratación y políticas salariales en una sola plataforma."
},
{
 nombre:"Clima laboral",
 menu:["Encuesta","Segmentación","Tabulación","Dashboard","Análisis IA","Recomendaciones"],
 descripcion:"Este módulo permite medir y analizar el clima laboral de la organización mediante encuestas estructuradas aplicadas a los colaboradores. Facilita la captura de respuestas, segmentación por variables demográficas y organizacionales, tabulación automática de resultados y visualización de indicadores a través de dashboards interactivos."
},
{
 nombre:"Expedientes de personal",
 menu:["Datos generales","Configuración laboral","Capacitación","Acciones de personal","Ausencias","Vacaciones","Medidas disciplinarias","Documentos"],
 descripcion:"Este módulo permite administrar de forma integral el expediente digital del colaborador, centralizando información personal, académica, laboral y de desarrollo profesional en una sola plataforma. Incluye la gestión de datos generales, configuración laboral, capacitación, acciones de personal, ausencias, vacaciones y medidas disciplinarias."
},
{
 nombre:"Compensación variable",
 menu:["Procedimiento","Tablas","Planilla","Cobertura","Porcentaje","Cumplimientos","Aplica"],
 descripcion:"Este módulo de Compensación Variable automatiza el cálculo de bonos para los colaboradores a partir de la información registrada en Google Sheets, cruzando datos de Planilla, Cobertura, Tablas de factores, Porcentajes y Cumplimientos. El sistema identifica qué bono aplica según el puesto del empleado, calcula el puntaje ponderado de cumplimiento, determina el porcentaje de bono y lo convierte en monto por frecuencia y bono anual."
},
{
 nombre:"Control de asistencia",
 menu:["Ingreso PIN","Marcar entrada","Marcar salida","Validación GPS","Historial","Limpieza de registros"],
 descripcion:"Este módulo administra el registro de asistencia de los colaboradores mediante una aplicación web conectada a Google Sheets. Permite registrar entradas y salidas desde dispositivos móviles, validando automáticamente la ubicación del empleado mediante coordenadas GPS y verificando que se encuentre dentro del radio autorizado de la empresa."
},
{
 nombre:"Plan de retiro",
 menu:["Datos del colaborador","Proyección","Simulación financiera","Gráficos","Comparativo","Fundamento legal"],
 descripcion:"Este módulo permite calcular y proyectar el costo futuro de las prestaciones laborales de un colaborador con base en su salario, antigüedad, edad y crecimiento salarial esperado. Además, estima el plan de retiro necesario para financiar esta obligación mediante una aportación inicial y aportes mensuales."
},
{
 nombre:"Prospección",
 menu:["Búsqueda","Ciudad","Departamento","País","Radio KM","Resultados","Exportar a Excel","Filtrar resultados"],
 descripcion:"Este módulo permite realizar búsquedas automatizadas de empresas o establecimientos en Google Maps mediante criterios como palabra clave, ciudad, departamento, país y radio de búsqueda. Recupera información detallada de cada resultado, incluyendo nombre, teléfono, dirección, sitio web y categoría, evitando registros duplicados."
},
{
 nombre:"Planificación estratégica",
 menu:["Formulario","Generar diagnóstico","Generar estrategia","Diseñar visión, misión y valores","Descargar Word","Mis automatizaciones"],
 descripcion:"Este módulo permite recopilar de forma estructurada la información estratégica de una empresa para elaborar un plan ejecutivo completo. Mediante inteligencia artificial genera un diagnóstico del negocio, diseña estrategias y construye la misión, visión y valores organizacionales."
},
{
 nombre:"Automatización de procesos con IA",
 menu:["Análisis de información","Generación de documentos","Reportes automáticos","Clasificación de datos","Flujos de trabajo","Recomendaciones IA"],
 descripcion:"Automatiza procesos administrativos mediante el uso de inteligencia artificial para reducir tareas manuales, mejorar la eficiencia y agilizar la toma de decisiones. Permite analizar información, generar documentos, elaborar reportes, clasificar datos y ejecutar flujos de trabajo de forma automática."
}
];

const contenedor = document.getElementById("botones");

modulos.forEach((m, i)=>{
  if(i === 4){
    const centro = document.createElement("div");
    centro.className = "centro";
    centro.innerHTML = `
      <h2>Ecosistema automatizado con IA</h2>
      <p>Una suite ejecutiva de soluciones digitales para transformar Recursos Humanos: más control, más velocidad y decisiones con datos.</p>
    `;
    contenedor.appendChild(centro);
  }

  const btn = document.createElement("button");
  btn.className = "modulo";
  btn.textContent = m.nombre;
  btn.onclick = () => mostrarModulo(m);
  contenedor.appendChild(btn);
});

function mostrarModulo(modulo){
  document.getElementById("panel").classList.add("activo");
  document.getElementById("tituloModulo").textContent = modulo.nombre;
  document.getElementById("descripcionModulo").textContent = modulo.descripcion;

  const menu = document.getElementById("menuModulo");
  menu.innerHTML = "";

  modulo.menu.forEach(item=>{
    const b = document.createElement("button");
    b.textContent = item;
    menu.appendChild(b);
  });
}

function cerrarPanel(){
  document.getElementById("panel").classList.remove("activo");
}

let puzzleSize = 3;
let tiles = [];

function togglePuzzleMenu(){
  const menu = document.getElementById("puzzleMenu");
  menu.style.display = menu.style.display === "block" ? "none" : "block";
}

function abrirPuzzle(size){
  puzzleSize = size;
  document.getElementById("puzzleMenu").style.display = "none";
  document.getElementById("puzzleModal").style.display = "flex";
  document.getElementById("nivelTexto").textContent = `Nivel ${size}x${size}`;
  crearPuzzle(size);
}

function cerrarPuzzle(){
  document.getElementById("puzzleModal").style.display = "none";
}

function crearPuzzle(size){
  const total = size * size;
  tiles = [];

  for(let i = 1; i < total; i++){
    tiles.push(i);
  }

  tiles.push("");

  do{
    tiles = tiles.sort(() => Math.random() - 0.5);
  }while(!esResoluble(tiles, size));

  dibujarPuzzle();
}

function dibujarPuzzle(){
  const board = document.getElementById("puzzleBoard");
  board.innerHTML = "";
  board.style.gridTemplateColumns = `repeat(${puzzleSize}, 1fr)`;
  board.style.gridTemplateRows = `repeat(${puzzleSize}, 1fr)`;

  tiles.forEach((tile, index)=>{
    const div = document.createElement("div");
    div.className = tile === "" ? "tile empty" : "tile";
    div.textContent = tile;
    div.onclick = () => moverTile(index);
    board.appendChild(div);
  });
}

function moverTile(index){
  const emptyIndex = tiles.indexOf("");
  const fila = Math.floor(index / puzzleSize);
  const col = index % puzzleSize;
  const emptyFila = Math.floor(emptyIndex / puzzleSize);
  const emptyCol = emptyIndex % puzzleSize;

  const esVecino = Math.abs(fila - emptyFila) + Math.abs(col - emptyCol) === 1;

  if(esVecino){
    [tiles[index], tiles[emptyIndex]] = [tiles[emptyIndex], tiles[index]];
    dibujarPuzzle();

    if(ganaste()){
      setTimeout(()=>alert("¡Ganaste! RH desbloqueado nivel ninja 🧩"),200);
    }
  }
}

function ganaste(){
  const correcto = [];

  for(let i = 1; i < puzzleSize * puzzleSize; i++){
    correcto.push(i);
  }

  correcto.push("");
  return tiles.every((v,i)=>v === correcto[i]);
}

function esResoluble(array, size){
  const nums = array.filter(n => n !== "");
  let inversiones = 0;

  for(let i = 0; i < nums.length; i++){
    for(let j = i + 1; j < nums.length; j++){
      if(nums[i] > nums[j]) inversiones++;
    }
  }

  if(size % 2 === 1){
    return inversiones % 2 === 0;
  }else{
    const emptyRowFromBottom = size - Math.floor(array.indexOf("") / size);
    return (emptyRowFromBottom % 2 === 0) !== (inversiones % 2 === 0);
  }
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <title>Mortalidad</title>
</head>

<body>

<h1>Portada Mortalidad</h1>

<button onclick="irAnalisis()">Ir a Análisis</button>

<script>

  // 🔴 URL QUE VIENE DEL GS
  let ANALYSIS_URL = '';

  // 🔴 🔴 🔴 PEGA AQUÍ TU URL REAL DE DEPLOY
  const ANALYSIS_URL_FALLBACK = "https://script.google.com/macros/s/AKfycbxuD8JRoy-YxFcTilRxx_xaec3VNJVYKzJoPVgGvwBUSmbsbJqbpE7bvyoVdEgOr8Yq4Q/exec";


  function irAnalisis() {
    const url = ANALYSIS_URL || ANALYSIS_URL_FALLBACK;

    if (!url) {
      alert("No hay URL de análisis configurada");
      return;
    }

    // 🔥 REDIRECCIÓN SEGURA
    window.top.location.href = url;
  }


  // 🔴 CARGA AUTOMÁTICA DESDE GS
  function cargar() {
    google.script.run
      .withSuccessHandler(res => {
        if (res && res.urls && res.urls.analysisUrl) {
          ANALYSIS_URL = res.urls.analysisUrl;
        }
      })
      .bootstrapAnalisisForClient();
  }

  cargar();

</script>

</body>
</html>
